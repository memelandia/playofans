<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — PlayOFans</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0612;font-family:'Poppins',sans-serif;color:#f0e6ff;overflow:hidden}
.container{text-align:center;position:relative;z-index:1;padding:40px 24px}
.code{font-size:clamp(80px,20vw,160px);font-weight:900;background:linear-gradient(135deg,#ff0066,#b300ff,#ff0066);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;animation:glow 3s ease-in-out infinite alternate}
.emoji{font-size:64px;margin:16px 0;animation:spin 4s linear infinite}
.msg{font-size:1.2rem;color:#a89cc8;margin:8px 0 32px}
.btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#ff0066,#b300ff);color:#fff;text-decoration:none;border-radius:50px;font-weight:600;font-size:1rem;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,0,102,.4)}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.p{position:absolute;width:4px;height:4px;background:#ff0066;border-radius:50;opacity:.3;animation:float 8s linear infinite}
.p:nth-child(2n){background:#b300ff;animation-duration:12s}
.p:nth-child(3n){background:#7c3aed;animation-duration:10s}
@keyframes glow{0%{filter:drop-shadow(0 0 20px rgba(255,0,102,.3))}100%{filter:drop-shadow(0 0 40px rgba(179,0,255,.5))}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}50%{opacity:.5}100%{transform:translateY(-20px) scale(1);opacity:0}}
</style>
</head>
<body>

<div class="particles">
  <div class="p" style="left:10%;animation-delay:0s"></div>
  <div class="p" style="left:25%;animation-delay:2s"></div>
  <div class="p" style="left:40%;animation-delay:4s"></div>
  <div class="p" style="left:55%;animation-delay:1s"></div>
  <div class="p" style="left:70%;animation-delay:3s"></div>
  <div class="p" style="left:85%;animation-delay:5s"></div>
</div>

<div class="container">
  <div class="code">404</div>
  <div class="emoji">🎰</div>
  <p class="msg">Esta página no existe... ¡pero la ruleta sí!</p>
  <a href="/" class="btn">Volver al inicio 🏠</a>
</div>

</body>
</html>
