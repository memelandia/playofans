<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayOFans — Ruleta</title>
<meta name="description" content="Gira la ruleta y gana premios exclusivos">
<meta property="og:title" content="PlayOFans — Ruleta">
<meta property="og:description" content="Gira la ruleta y gana premios exclusivos">
<meta property="og:url" content="">
<meta property="og:type" content="website">
<meta property="og:site_name" content="PlayOFans">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES — se sobreescriben por tema
   ============================================= */
:root {
  --bg-a: #1a0a1e;
  --bg-b: #2d1b3d;
  --bg-c: #1e0a28;
  --accent: #ff0066;
  --accent2: #b300ff;
  --text: #ffffff;
  --text-soft: #e0b3ff;
  --glass: rgba(30, 10, 40, 0.85);
  --glass-border: rgba(179, 0, 255, 0.3);
  --accent-soft: rgba(255, 0, 102, 0.15);
  --accent-border: rgba(255, 0, 102, 0.5);
  --font: 'Poppins', sans-serif;
  --font-display: 'Dancing Script', cursive;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  text-align: center;
  min-height: 100vh;
  color: var(--text);
  background: linear-gradient(-45deg, var(--bg-a), var(--bg-b), var(--bg-c), var(--bg-b), var(--bg-a));
  background-size: 400% 400%;
  animation: gradientMove 10s ease-in-out infinite;
  overflow-x: hidden;
}

body.force-dark { color-scheme: dark; }

/* =============================================
   ANIMACIONES
   ============================================= */
@keyframes gradientMove {
  0%   { background-position: 0% 50%; }
  25%  { background-position: 100% 50%; }
  50%  { background-position: 100% 100%; }
  75%  { background-position: 0% 100%; }
  100% { background-position: 0% 50%; }
}
@keyframes float {
  0%   { transform: translateY(0) rotate(0deg); }
  33%  { transform: translateY(-20px) rotate(45deg); }
  66%  { transform: translateY(15px) rotate(-30deg); }
  100% { transform: translateY(0) rotate(0deg); }
}
@keyframes floatHeart {
  0%, 100% { transform: translateY(0) scale(1) rotate(0deg); opacity: .4; }
  33% { transform: translateY(-50px) scale(1.2) rotate(15deg); opacity: .8; }
  66% { transform: translateY(-30px) scale(.8) rotate(-10deg); opacity: .6; }
}
@keyframes floatSparkle {
  0%, 100% { transform: translateY(0) scale(1); opacity: .5; box-shadow: 0 0 10px var(--accent2); }
  50% { transform: translateY(-40px) scale(1.5); opacity: 1; box-shadow: 0 0 20px var(--accent); }
}
@keyframes floatStar {
  0%, 100% { transform: translateY(0) rotate(0deg) scale(1); opacity: .4; }
  25% { transform: translateY(-35px) rotate(180deg) scale(1.1); opacity: .7; }
  50% { transform: translateY(-60px) rotate(360deg) scale(.9); opacity: .9; }
  75% { transform: translateY(-25px) rotate(540deg) scale(1.2); opacity: .6; }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px) scale(.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* =============================================
   FONDO Y PARTICULAS
   ============================================= */
.bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
.shape {
  position: absolute; border-radius: 50%; opacity: .08;
  animation: float 15s ease-in-out infinite;
}
.shape:nth-child(1) { width: 80px; height: 80px; background: var(--accent); top: 10%; left: 10%; }
.shape:nth-child(2) { width: 120px; height: 120px; background: var(--accent2); top: 20%; right: 15%; animation-delay: 2s; }
.shape:nth-child(3) { width: 60px; height: 60px; background: var(--bg-c); bottom: 20%; left: 20%; animation-delay: 4s; }
.shape:nth-child(4) { width: 100px; height: 100px; background: var(--accent); bottom: 10%; right: 10%; animation-delay: 1s; }

.particle { position: absolute; pointer-events: none; opacity: .6; }
.particle.heart { font-size: 20px; color: var(--accent); animation: floatHeart 10s ease-in-out infinite; }
.particle.sparkle { width: 8px; height: 8px; background: radial-gradient(circle, var(--accent2), var(--accent)); border-radius: 50%; animation: floatSparkle 6s ease-in-out infinite; }
.particle.star { font-size: 16px; color: var(--accent2); animation: floatStar 12s ease-in-out infinite; }

/* =============================================
   LAYOUT
   ============================================= */
.container {
  position: relative; z-index: 1; padding: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; max-width: 1400px; margin: 0 auto; gap: 20px;
}
.main-content {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; max-width: 1200px; flex: 1; gap: 40px;
}

/* =============================================
   CONTROLES (columna izquierda)
   ============================================= */
.controls-container { display: flex; flex-direction: column; align-items: center; gap: 25px; }
.controls-section {
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  background: var(--glass); padding: 35px; border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,.1); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); width: 320px;
}
.controls-title {
  font-family: var(--font-display); color: var(--accent2);
  font-size: 2.5rem; font-weight: 700;
  text-shadow: 0 4px 15px rgba(0,0,0,.4), 0 0 10px rgba(255,255,255,.3);
}
.form-title {
  font-family: var(--font-display); font-size: 1.6rem;
  color: var(--accent2); margin-bottom: 10px;
  text-shadow: 2px 2px 5px rgba(0,0,0,.15);
}

#codigo {
  padding: 18px 20px; font-size: 1.1rem;
  border: 3px solid var(--accent); border-radius: 20px;
  width: 100%; text-align: center; transition: all .3s;
  background: var(--glass); font-weight: 600;
  color: var(--text); text-transform: uppercase;
}
#codigo::placeholder { color: var(--text-soft); opacity: .6; text-transform: none; }
#codigo:focus {
  outline: none; box-shadow: 0 0 30px rgba(255,79,163,.5);
  border-color: var(--accent2); transform: translateY(-2px);
}

.btn {
  padding: 15px 25px; font-size: 1rem;
  background: linear-gradient(45deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 20px; cursor: pointer;
  font-weight: 600; width: 100%; text-transform: uppercase;
  transition: all .3s; box-shadow: 0 4px 15px rgba(0,0,0,.2);
  font-family: var(--font);
}
.btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.3); filter: brightness(1.1); }
.btn:disabled { background: linear-gradient(45deg, #555, #333); cursor: not-allowed; opacity: .6; }

#girarBtn {
  padding: 18px 50px; font-size: 1.2rem; font-weight: 700;
  min-width: 280px; border-radius: 30px;
  box-shadow: 0 6px 20px rgba(0,0,0,.3);
  text-shadow: 1px 1px 3px rgba(0,0,0,.3);
}
#girarBtn:hover:not(:disabled) { transform: translateY(-4px) scale(1.02); }

/* Info tiradas y expiracion */
.spins-info {
  display: none; width: 100%; text-align: center;
  font-weight: 600; color: var(--text-soft); font-size: .95rem;
  padding: 10px; border-radius: 12px;
  background: var(--accent-soft); border: 1px solid var(--accent-border);
}
.spins-info.visible { display: block; }
.countdown { color: var(--accent); font-weight: 700; }

/* =============================================
   RULETA SVG
   ============================================= */
.ruleta-section { display: flex; flex-direction: column; align-items: center; gap: 30px; flex-shrink: 0; }
.wheel-wrapper {
  position: relative; width: 450px; height: 450px;
}
.wheel-border {
  width: 100%; height: 100%; border-radius: 50%;
  border: 10px solid var(--accent);
  box-shadow: 0 15px 30px rgba(0,0,0,.2), inset 0 0 30px rgba(0,0,0,.1);
  overflow: hidden; position: relative;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}
#wheel-svg {
  width: 100%; height: 100%;
  transition: none;
}
#wheel-svg.idling { animation: slowRotate 30s linear infinite; }
.wheel-pointer {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 22px solid transparent; border-right: 22px solid transparent;
  border-top: 45px solid var(--accent);
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.4));
  z-index: 15;
}

/* =============================================
   HISTORIAL (columna derecha)
   ============================================= */
.historial-container { display: flex; flex-direction: column; align-items: center; gap: 25px; }
.historial-section {
  background: var(--glass); padding: 25px; border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,.1); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); width: 320px; max-height: 500px;
}
.historial-title {
  font-family: var(--font-display); color: var(--accent2);
  font-size: 2rem; font-weight: 700;
  text-shadow: 0 4px 15px rgba(0,0,0,.4), 0 0 10px rgba(255,255,255,.3);
  margin-bottom: 20px; text-align: center;
}
.historial-lista { max-height: 380px; overflow-y: auto; padding-right: 10px; }
.historial-lista::-webkit-scrollbar { width: 8px; }
.historial-lista::-webkit-scrollbar-track { background: rgba(255,255,255,.1); border-radius: 10px; }
.historial-lista::-webkit-scrollbar-thumb { background: linear-gradient(45deg, var(--accent), var(--accent2)); border-radius: 10px; }

.premio-item {
  background: linear-gradient(135deg, var(--accent-soft), rgba(122,92,255,.08));
  border: 2px solid var(--accent-border); border-radius: 15px;
  padding: 15px; margin-bottom: 12px; transition: all .3s;
  position: relative; overflow: hidden;
}
.premio-item:hover { transform: translateX(5px); box-shadow: 0 8px 20px rgba(0,0,0,.15); }
.premio-item::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  transition: left .5s;
}
.premio-item:hover::before { left: 100%; }
.premio-nombre { font-weight: 700; color: var(--accent2); font-size: .95rem; margin-bottom: 5px; }
.premio-fecha { font-size: .8rem; color: var(--text-soft); font-weight: 500; display: flex; align-items: center; gap: 5px; }
.premio-numero {
  position: absolute; top: 8px; right: 12px;
  background: linear-gradient(45deg, var(--accent), var(--accent2));
  color: #fff; border-radius: 50%; width: 25px; height: 25px;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: bold;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.historial-vacio {
  text-align: center; color: var(--text-soft); font-style: italic;
  padding: 30px 20px; background: rgba(255,255,255,.05);
  border-radius: 15px; border: 2px dashed var(--accent-border);
}
.historial-vacio::before { content: '🎁'; display: block; font-size: 2rem; margin-bottom: 10px; opacity: .5; }

/* =============================================
   MENSAJE
   ============================================= */
.message-section { width: 100%; max-width: 600px; }
#mensaje {
  font-size: 1.1rem; color: var(--accent2); font-weight: 600;
  background: var(--glass); padding: 15px 25px; border-radius: 20px;
  display: inline-block; box-shadow: 0 8px 20px rgba(0,0,0,.15);
  backdrop-filter: blur(10px); border: 2px solid var(--glass-border);
  min-height: 35px; transition: all .3s;
}

/* =============================================
   POPUP PREMIO
   ============================================= */
.popup-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.5); backdrop-filter: blur(8px);
  display: flex; justify-content: center; align-items: center;
  z-index: 1000; opacity: 0; visibility: hidden; transition: all .3s;
}
.popup-overlay.show { opacity: 1; visibility: visible; }
.popup-content {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 30px; padding: 40px; text-align: center;
  max-width: 500px; width: 90%;
  transform: scale(.5); transition: all .4s cubic-bezier(.68,-.55,.27,1.55);
}
.popup-overlay.show .popup-content { transform: scale(1); }
.popup-title { font-family: var(--font-display); font-size: 3rem; color: #fff; margin-bottom: 20px; }
.popup-prize { font-size: 1.5rem; color: #fff; font-weight: 700; margin: 20px 0; padding: 15px; background: rgba(255,255,255,.2); border-radius: 15px; }
.popup-message { font-size: .95rem; color: #fff; opacity: .9; margin-top: 15px; font-weight: 500; }
.popup-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
.popup-btn {
  background: #fff; color: var(--accent2); border: none;
  padding: 15px 30px; border-radius: 25px; font-weight: 700;
  font-size: 1.1rem; cursor: pointer; font-family: var(--font);
  transition: all .3s;
}
.popup-btn:hover { transform: scale(1.05); }
.popup-btn.share { background: rgba(255,255,255,.2); color: #fff; font-size: .9rem; padding: 10px 20px; }

/* =============================================
   NOTIFICACION
   ============================================= */
.notif {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 10000;
  display: none; transform: translateY(-100%); transition: transform .3s;
}
.notif.show { transform: translateY(0); }
.notif.success { background: linear-gradient(135deg, var(--accent2), var(--accent)); }
.notif.error { background: linear-gradient(135deg, #d9534f, #c9302c); }
.notif-inner { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; max-width: 1200px; margin: 0 auto; }
.notif-text { color: #fff; font-weight: 600; flex: 1; }
.notif-close { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; padding: 0 10px; opacity: .8; }
.notif-close:hover { opacity: 1; }

/* =============================================
   CONTROLES SUPERIORES (mute + admin)
   ============================================= */
.top-controls {
  position: fixed; top: 15px; right: 15px; z-index: 100;
  display: flex; gap: 10px;
}
.top-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px); display: flex; align-items: center;
  justify-content: center; font-size: 1.3rem; cursor: pointer;
  transition: all .3s; color: var(--text);
}
.top-btn:hover { transform: scale(1.1); background: var(--accent-soft); }

/* =============================================
   PANTALLA ERROR / CARGA
   ============================================= */
.screen-error, .screen-loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 2000;
  background: linear-gradient(-45deg, var(--bg-a), var(--bg-b), var(--bg-c));
}
.screen-error h1 { font-size: 4rem; margin-bottom: 20px; }
.screen-error p { font-size: 1.3rem; color: var(--text-soft); max-width: 400px; }
.screen-loading .spinner-lg {
  width: 60px; height: 60px; border: 4px solid var(--glass-border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 1s linear infinite;
}

/* Confetti */
.confetti-piece {
  position: fixed; width: 10px; height: 10px; top: -10px;
  z-index: 999; pointer-events: none;
  animation: confettiFall 3s ease-in forwards;
}

/* =============================================
   RESPONSIVE
   ============================================= */
@media (min-width: 992px) {
  .main-content {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 60px;
  }
  .controls-container { grid-column: 1; justify-self: end; }
  .ruleta-section { grid-column: 2; }
  .historial-container { grid-column: 3; justify-self: start; display: none; }
  .historial-container.visible { display: flex; }
}

@media (max-width: 991px) {
  .main-content {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 15px; align-items: start; justify-items: center;
  }
  .controls-container { grid-column: 1; }
  .historial-container { grid-column: 2; }
  .ruleta-section { grid-column: 1 / -1; }
  .controls-section, .historial-section { width: 100%; max-width: 280px; padding: 15px; }
  .controls-title { font-size: 2.2rem; }
  .historial-title { font-size: 1.8rem; }
  .wheel-wrapper { width: 400px; height: 400px; }
  .wheel-border { border-width: 8px; }
  .wheel-pointer { border-left-width: 20px; border-right-width: 20px; border-top-width: 40px; top: -15px; }
  #girarBtn { min-width: 250px; padding: 16px 40px; font-size: 1.1rem; }
}

@media (max-width: 768px) {
  .container { padding: 15px; gap: 15px; }
  .wheel-wrapper { width: 350px; height: 350px; }
  .wheel-border { border-width: 7px; }
  .wheel-pointer { border-left-width: 18px; border-right-width: 18px; border-top-width: 35px; top: -12px; }
  .controls-title { font-size: 2rem; }
  .form-title { font-size: 1.4rem; }
  #codigo { font-size: .95rem; padding: 15px 18px; }
  #mensaje { font-size: 1rem; padding: 12px 20px; }
  .popup-content { padding: 30px; max-width: 400px; }
  .popup-title { font-size: 2.5rem; }
}

@media (max-width: 480px) {
  .main-content { grid-template-columns: 1fr; }
  .controls-container, .historial-container { grid-column: 1; }
  .controls-section, .historial-section { max-width: 100%; width: 100%; }
  .wheel-wrapper { width: 300px; height: 300px; }
  .wheel-border { border-width: 6px; }
  .wheel-pointer { border-left-width: 16px; border-right-width: 16px; border-top-width: 30px; top: -10px; }
  .controls-title { font-size: 1.8rem; }
  #girarBtn { min-width: 200px; padding: 14px 30px; font-size: .95rem; }
  .popup-content { padding: 25px; max-width: 340px; }
  .popup-title { font-size: 2.2rem; }
  .shape:nth-child(1) { width: 50px; height: 50px; }
  .shape:nth-child(2) { width: 70px; height: 70px; }
  .shape:nth-child(3) { width: 40px; height: 40px; }
  .shape:nth-child(4) { width: 60px; height: 60px; }
  .particle.heart { font-size: 16px; }
  .particle.sparkle { width: 6px; height: 6px; }
  .particle.star { font-size: 12px; }
}

@media (max-width: 360px) {
  .wheel-wrapper { width: 260px; height: 260px; }
  .wheel-border { border-width: 5px; }
  .controls-title { font-size: 1.6rem; }
  #girarBtn { min-width: 180px; padding: 12px 25px; font-size: .85rem; }
}
</style>
</head>
<body>

<!-- Pantalla de carga -->
<div class="screen-loading" id="screen-loading">
  <div class="spinner-lg"></div>
</div>

<!-- Pantalla de error -->
<div class="screen-error" id="screen-error" style="display:none">
  <h1 id="error-emoji">🎰</h1>
  <p id="error-msg"></p>
</div>

<!-- Notificacion -->
<div class="notif" id="notif">
  <div class="notif-inner">
    <span class="notif-text" id="notif-text"></span>
    <button class="notif-close" id="notif-close">&times;</button>
  </div>
</div>

<!-- Popup premio -->
<div class="popup-overlay" id="popup">
  <div class="popup-content">
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-prize" id="popup-prize"></div>
    <div class="popup-message" id="popup-message"></div>
    <div class="popup-buttons">
      <button class="popup-btn" id="popup-close-btn"></button>
      <button class="popup-btn share" id="popup-share-btn">📤 Compartir</button>
    </div>
  </div>
</div>

<!-- Fondo -->
<div class="bg-shapes">
  <div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div>
</div>

<!-- Controles superiores -->
<div class="top-controls">
  <button class="top-btn" id="btn-mute" title="Silenciar">🔊</button>
</div>

<!-- Contenido principal -->
<div class="container">
  <div class="main-content">

    <!-- COLUMNA IZQUIERDA: Controles -->
    <div class="controls-container">
      <div class="controls-title" id="model-name">PlayOFans</div>
      <div class="controls-section">
        <div class="form-title" id="form-title"></div>
        <div id="form-code">
          <input type="text" id="codigo" placeholder="" maxlength="20" autocomplete="off">
          <button class="btn" id="btn-validar"></button>
        </div>
        <div class="spins-info" id="spins-info"></div>
      </div>
    </div>

    <!-- COLUMNA CENTRAL: Ruleta -->
    <div class="ruleta-section">
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <div class="wheel-border">
          <svg id="wheel-svg" viewBox="0 0 450 450" class="idling"></svg>
        </div>
      </div>
      <button class="btn" id="girarBtn" disabled></button>
    </div>

    <!-- COLUMNA DERECHA: Historial -->
    <div class="historial-container" id="historial-container">
      <div class="historial-section">
        <div class="historial-title" id="historial-title"></div>
        <div class="historial-lista" id="historial-lista">
          <div class="historial-vacio" id="historial-vacio"></div>
        </div>
      </div>
    </div>

  </div>
  <div class="message-section">
    <div id="mensaje"></div>
  </div>
</div>

<script>
// =============================================================================
// TEXTOS UI (todo en un solo objeto para i18n futuro)
// =============================================================================

// =============================================================================
// INICIALIZACION
// =============================================================================
document.addEventListener('DOMContentLoaded', init);

async function init() {
  // Extraer slug de la URL: /xvickyluna/ruleta → "xvickyluna"
  const parts = window.location.pathname.split('/').filter(Boolean);
  STATE.slug = parts[0] || '';

  if (!STATE.slug) return showError(TEXTS.errorNoEncontrado);

  // Codigo precargado desde ?c=XXXX
  const params = new URLSearchParams(window.location.search);
  const preCode = params.get('c');

  // Inicializar textos UI
  setText('form-title', TEXTS.formTitle);
  setText('historial-title', TEXTS.historialTitle);
  setText('historial-vacio', TEXTS.historialVacio);
  setText('mensaje', TEXTS.msgInicial);
  document.getElementById('codigo').placeholder = TEXTS.placeholder;
  document.getElementById('btn-validar').textContent = TEXTS.btnValidar;
  document.getElementById('girarBtn').textContent = TEXTS.btnGirar;
  document.getElementById('popup-close-btn').textContent = TEXTS.popupClose;

  // Event listeners
  document.getElementById('btn-validar').addEventListener('click', validarCodigo);
  document.getElementById('codigo').addEventListener('keydown', e => { if (e.key === 'Enter') validarCodigo(); });
  document.getElementById('girarBtn').addEventListener('click', girarRuleta);
  document.getElementById('popup-close-btn').addEventListener('click', cerrarPopup);
  document.getElementById('popup-share-btn').addEventListener('click', compartirPremio);
  document.getElementById('btn-mute').addEventListener('click', toggleMute);
  document.getElementById('notif-close').addEventListener('click', cerrarNotif);

  // Cargar config del tenant
  try {
    const res = await fetch(`/api/tenant-config?slug=${STATE.slug}`);
    const data = await res.json();

    if (res.status === 404) return showError(TEXTS.errorNoEncontrado);
    if (res.status === 403) return showError(data.error || TEXTS.errorNoDisponible);
    if (!res.ok) return showError(data.error || TEXTS.errorNoDisponible);

    STATE.config = data;
    STATE.prizes = data.prizes || [];

    applyTheme(data.theme || 'dark_luxury');
    updateOGTags(data);

    document.getElementById('model-name').textContent = data.display_name || STATE.slug;

    STATE.isMuted = !data.sound_enabled_default;
    document.getElementById('btn-mute').textContent = STATE.isMuted ? '🔇' : '🔊';

    if (data.force_dark_mode) document.body.classList.add('force-dark');

    drawWheel(STATE.prizes);
    createParticles();

    // Ocultar pantalla de carga
    document.getElementById('screen-loading').style.display = 'none';

    // Si hay codigo precargado
    if (preCode) {
      document.getElementById('codigo').value = preCode;
      validarCodigo();
    }

    // Recovery: comprobar token pendiente en localStorage
    const savedToken = localStorage.getItem(`pof_token_${STATE.slug}`);
    if (savedToken) STATE.pendingToken = savedToken;

  } catch (err) {
    showError(TEXTS.errorNoDisponible);
  }
}

function applyTheme(themeId) {
  const t = THEMES[themeId] || THEMES.dark_luxury;
  const r = document.documentElement.style;
  r.setProperty('--bg-a', t.bgA);
  r.setProperty('--bg-b', t.bgB);
  r.setProperty('--bg-c', t.bgC);
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent2', t.accent2);
  r.setProperty('--text', t.text);
  r.setProperty('--text-soft', t.textSoft);
  r.setProperty('--glass', t.glass);
  r.setProperty('--glass-border', t.glassBorder);
  r.setProperty('--accent-soft', t.accentSoft);
  r.setProperty('--accent-border', t.accentBorder);
}

function updateOGTags(config) {
  const url = `https://playofans.com/${STATE.slug}/ruleta`;

  if (el) el.setAttribute('content', content);
}

// =============================================================================
// DIBUJAR RULETA SVG
// =============================================================================
function drawWheel(prizes) {
  const svg = document.getElementById('wheel-svg');
  const theme = THEMES[STATE.config?.theme] || THEMES.dark_luxury;
  const n = prizes.length;
  if (n < 2) return;

  const cx = 225, cy = 225, r = 220;
  let html = '';

  for (let i = 0; i < n; i++) {
    const a1 = (2 * Math.PI / n) * i - Math.PI / 2;
    const a2 = (2 * Math.PI / n) * (i + 1) - Math.PI / 2;
    const x1 = cx + r * Math.cos(a1);
    const y1 = cy + r * Math.sin(a1);
    const x2 = cx + r * Math.cos(a2);
    const y2 = cy + r * Math.sin(a2);
    const large = (a2 - a1 > Math.PI) ? 1 : 0;
    const color = theme.sliceColors[i % theme.sliceColors.length];

    // Slice
    html += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${color}" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>`;

    // Texto
    const aMid = (a1 + a2) / 2;
    const textR = r * 0.65;
    const tx = cx + textR * Math.cos(aMid);
    const ty = cy + textR * Math.sin(aMid);
    const angleDeg = (aMid * 180 / Math.PI);

    // Limpiar emojis y partir en lineas
    const clean = prizes[i].replace(/[\u{1F300}-\u{1F9FF}]/gu, '').trim().toUpperCase();
    const words = clean.split(' ');
    let lines = [], line = '';
    words.forEach(w => {
      if ((line + w).length > 10 && line) { lines.push(line.trim()); line = w + ' '; }
      else { line += w + ' '; }
    });
    lines.push(line.trim());

    const fontSize = n > 6 ? 11 : 14;
    const lineH = fontSize + 3;
    const startY = -(lines.length - 1) * lineH / 2;

    html += `<g transform="translate(${tx},${ty}) rotate(${angleDeg})">`;
    lines.forEach((l, j) => {
      html += `<text x="0" y="${startY + j * lineH}" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="Poppins,sans-serif" font-weight="700" font-size="${fontSize}" style="text-shadow:1px 1px 3px rgba(0,0,0,.7)">${escapeHtml(l)}</text>`;
    });
    html += '</g>';
  }

  // Circulo central
  const emoji = theme.emoji;
  html += `<circle cx="${cx}" cy="${cy}" r="38" fill="${theme.accent}" fill-opacity="0.8" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>`;
  html += `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="32">${emoji}</text>`;

  svg.innerHTML = html;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =============================================================================
// VALIDAR CODIGO
// =============================================================================
async function validarCodigo() {
  const input = document.getElementById('codigo');
  const code = input.value.trim().toUpperCase();
  if (!code) { input.style.animation = 'shake .5s'; setTimeout(() => input.style.animation = '', 500); return; }

  setText('mensaje', TEXTS.msgValidando);
  document.getElementById('btn-validar').disabled = true;

  try {
    const res = await fetch('/api/validate-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: STATE.slug, codigoId: code, fanName: '' }),
    });
    const data = await res.json();

    if (!res.ok) {
      notif(data.error || 'Codigo no valido', 'error');
      setText('mensaje', data.error || 'Codigo no valido');
      document.getElementById('btn-validar').disabled = false;
      return;
    }

    // Exito
    STATE.code = code;
    STATE.fanName = data.fan_name;
    STATE.remainingSpins = data.remaining_spins;
    STATE.totalSpins = data.total_spins;
    STATE.expiresAt = data.expires_at ? new Date(data.expires_at) : null;

    // Premios del codigo o globales
    if (data.prizes && data.prizes.length >= 2) {
      STATE.prizes = data.prizes;
      drawWheel(STATE.prizes);
    }

    // Mostrar mensaje de bienvenida
    setText('mensaje', data.welcome_message);

    // Actualizar UI
    updateSpinsInfo();
    startCountdown();
    loadHistory();

    // Habilitar/deshabilitar boton girar
    const girarBtn = document.getElementById('girarBtn');
    if (STATE.remainingSpins > 0) {
      girarBtn.disabled = false;
      girarBtn.textContent = TEXTS.btnGirar;
    } else {
      girarBtn.disabled = true;
      girarBtn.textContent = TEXTS.btnSinTiradas;
    }

    // Ocultar formulario, mostrar historial
    document.getElementById('form-code').style.display = 'none';
    document.getElementById('historial-container').classList.add('visible');

    playSound('click');

  } catch (err) {
    notif('Error de conexion', 'error');
    document.getElementById('btn-validar').disabled = false;
  }
}

// =============================================================================
// GIRAR RULETA
// =============================================================================
async function girarRuleta() {
  if (STATE.isSpinning || STATE.remainingSpins <= 0) return;
  STATE.isSpinning = true;

  const girarBtn = document.getElementById('girarBtn');
  girarBtn.disabled = true;
  girarBtn.textContent = TEXTS.btnGirando;
  setText('mensaje', TEXTS.msgGirando);

  const svg = document.getElementById('wheel-svg');
  svg.classList.remove('idling');

  try {
    // 1. Llamar prepare-spin
    const res = await fetch('/api/prepare-spin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ codigoId: STATE.code, slug: STATE.slug }),
    });
    const data = await res.json();

    if (!res.ok) {
      notif(data.error || 'Error al preparar la tirada', 'error');
      setText('mensaje', data.error || 'Error');
      resetSpinButton();
      return;
    }

    const { prize, wheelIndex, token, recovered } = data;

    // Guardar token en localStorage para recovery
    localStorage.setItem(`pof_token_${STATE.slug}`, token);
    STATE.pendingToken = token;

    if (recovered) notif('Recuperando tirada anterior...', 'success');

    // 2. Animar ruleta hacia el wheelIndex
    playSound('spin', true);
    await animateWheel(wheelIndex);

    // 3. Confirmar spin
    stopSound('spin');
    playSound('win');

    const confirmRes = await fetch('/api/confirm-spin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const confirmData = await confirmRes.json();

    if (confirmRes.ok && confirmData.success) {
      STATE.remainingSpins = confirmData.remaining_spins;
    }

    // Limpiar token
    localStorage.removeItem(`pof_token_${STATE.slug}`);
    STATE.pendingToken = null;

    // 4. Mostrar resultado
    const postMsg = (STATE.config.post_prize_message || '').replace(/\{nombre\}/gi, STATE.fanName);
    showPopup(prize, postMsg);
    setText('mensaje', `🎉 ¡Ganaste: ${prize}!`);
    addToHistory(prize);
    launchConfetti();
    updateSpinsInfo();

    // Resetear boton
    resetSpinButton();

  } catch (err) {
    stopSound('spin');
    notif('Error de conexion. Tu tirada esta guardada.', 'error');
    resetSpinButton();
  }
}

function resetSpinButton() {
  STATE.isSpinning = false;
  const btn = document.getElementById('girarBtn');
  if (STATE.remainingSpins > 0) {
    btn.disabled = false;
    btn.textContent = TEXTS.btnGirar;
  } else {
    btn.disabled = true;
    btn.textContent = TEXTS.btnSinTiradas;
  }
}

// =============================================================================
// ANIMACION RULETA
// =============================================================================
function animateWheel(targetIndex) {
  return new Promise(resolve => {
    const svg = document.getElementById('wheel-svg');
    const n = STATE.prizes.length;
    const sliceAngle = 360 / n;

    // La flecha esta arriba (top), apuntando hacia abajo.
    // El SVG esta dibujado con offset -90deg (primer slice arriba).
    // Para que el premio targetIndex quede arriba (bajo la flecha):
    // angulo = vueltas + (360 - targetIndex * sliceAngle - sliceAngle/2)
    const targetAngle = 360 - (targetIndex * sliceAngle) - (sliceAngle / 2);
    const totalAngle = 360 * 6 + targetAngle;

    svg.style.transition = 'none';
    svg.style.transform = 'rotate(0deg)';
    svg.offsetWidth; // force reflow

    svg.style.transition = 'transform 5s cubic-bezier(.17,.67,.12,.99)';
    svg.style.transform = `rotate(${totalAngle}deg)`;

    setTimeout(resolve, 5100);
  });
}

// =============================================================================
// HISTORIAL PREMIOS
// =============================================================================
function loadHistory() {
  try {
    const saved = localStorage.getItem(`pof_history_${STATE.slug}_${STATE.code}`);
    if (saved) {
      STATE.history = JSON.parse(saved);
      STATE.historyCount = STATE.history.length;
    }
  } catch (e) {
    STATE.history = [];
  }
  renderHistory();
}

function addToHistory(prize) {
  STATE.historyCount++;
  STATE.history.unshift({
    id: STATE.historyCount,
    nombre: prize,
    fecha: new Date().toLocaleString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }),
  });
  try {
    localStorage.setItem(`pof_history_${STATE.slug}_${STATE.code}`, JSON.stringify(STATE.history));
  } catch (e) {}
  renderHistory();
}

function renderHistory() {
  const lista = document.getElementById('historial-lista');
  const vacio = document.getElementById('historial-vacio');

  if (STATE.history.length === 0) {
    vacio.style.display = 'block';
    return;
  }
  vacio.style.display = 'none';

  lista.innerHTML = STATE.history.map((p, i) => `
    <div class="premio-item" style="animation:fadeInUp .5s ease ${i * .1}s both">
      <div class="premio-numero">${p.id}</div>
      <div class="premio-nombre">${escapeHtml(p.nombre)}</div>
      <div class="premio-fecha">🕐 ${p.fecha}</div>
    </div>
  `).join('');

  lista.scrollTop = 0;
}

// =============================================================================
// INFO TIRADAS + COUNTDOWN
// =============================================================================
function updateSpinsInfo() {
  const el = document.getElementById('spins-info');
  const word = STATE.remainingSpins === 1 ? TEXTS.tirada : TEXTS.tiradas;
  el.innerHTML = `${TEXTS.teQuedan} <strong>${STATE.remainingSpins}</strong> ${word}`;
  el.classList.add('visible');
}

let countdownInterval = null;
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  if (!STATE.expiresAt) return;

  const el = document.getElementById('spins-info');

  function update() {
    const diff = STATE.expiresAt - Date.now();
    if (diff <= 0) {
      el.innerHTML += ' <span class="countdown">⏰ Codigo expirado</span>';
      clearInterval(countdownInterval);
      return;
    }
    // Solo mostrar si < 72h
    if (diff < 72 * 3600 * 1000) {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const word = STATE.remainingSpins === 1 ? TEXTS.tirada : TEXTS.tiradas;
      el.innerHTML = `${TEXTS.teQuedan} <strong>${STATE.remainingSpins}</strong> ${word} <span class="countdown">${TEXTS.expiraEn} ${h}h ${m}m</span>`;
    }
  }

  update();
  countdownInterval = setInterval(update, 60000);
}

// =============================================================================
// POPUP
// =============================================================================
function showPopup(prize, message) {
  document.getElementById('popup-title').textContent = TEXTS.popupTitle;
  document.getElementById('popup-prize').textContent = prize;
  document.getElementById('popup-message').textContent = message;
  document.getElementById('popup').classList.add('show');
}
function cerrarPopup() {
  document.getElementById('popup').classList.remove('show');
}

// =============================================================================
// COMPARTIR (Canvas API)
// =============================================================================
async function compartirPremio() {
  const prize = document.getElementById('popup-prize').textContent;
  const name = STATE.config?.display_name || STATE.slug;
  const theme = THEMES[STATE.config?.theme] || THEMES.dark_luxury;

  const canvas = document.createElement('canvas');
  canvas.width = 600; canvas.height = 400;
  const ctx = canvas.getContext('2d');

  // Fondo gradiente
  const grad = ctx.createLinearGradient(0, 0, 600, 400);
  grad.addColorStop(0, theme.bgA);
  grad.addColorStop(1, theme.bgB);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 600, 400);

  // Texto
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';

  ctx.font = 'bold 28px Poppins, sans-serif';
  ctx.fillText(`${theme.emoji} ${name}`, 300, 80);

  ctx.font = 'bold 22px Poppins, sans-serif';
  ctx.fillText('¡Gane en la ruleta!', 300, 140);

  ctx.font = 'bold 36px Poppins, sans-serif';
  ctx.fillStyle = theme.accent;
  ctx.fillText(prize, 300, 220);

  ctx.font = '16px Poppins, sans-serif';
  ctx.fillStyle = theme.textSoft;
  ctx.fillText('playofans.com/' + STATE.slug + '/ruleta', 300, 340);

  canvas.toBlob(async blob => {
    if (navigator.share && navigator.canShare) {
      try {
        const file = new File([blob], 'premio.png', { type: 'image/png' });
        await navigator.share({ files: [file], text: `¡Gane "${prize}" en la ruleta de ${name}!` });
      } catch (e) { /* user cancelled */ }
    } else {
      // Fallback: descargar
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'premio.png';
      a.click();
    }
  }, 'image/png');
}

// =============================================================================
// SONIDOS
// =============================================================================
function playSound(name, loop) {
  if (STATE.isMuted) return;
  const s = sounds[name];
  if (!s) return;
  s.loop = !!loop;
  s.currentTime = 0;
  s.play().catch(() => {});
}
function stopSound(name) {
  const s = sounds[name];
  if (!s) return;
  s.pause();
  s.currentTime = 0;
}
function toggleMute() {
  STATE.isMuted = !STATE.isMuted;
  document.getElementById('btn-mute').textContent = STATE.isMuted ? '🔇' : '🔊';
  if (STATE.isMuted) Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; });
}

// =============================================================================
// PARTICULAS
// =============================================================================
function createParticles() {
  const container = document.querySelector('.bg-shapes');
  const types = ['heart', 'sparkle', 'star'];
  const emojis = { heart: '💖', star: '✨' };

  for (let i = 0; i < 15; i++) {
    const type = types[i % types.length];
    const el = document.createElement('div');
    el.className = `particle ${type}`;
    el.style.left = Math.random() * 100 + '%';
    el.style.top = Math.random() * 100 + '%';
    el.style.animationDelay = (Math.random() * 5) + 's';
    if (emojis[type]) el.textContent = emojis[type];
    container.appendChild(el);
  }
}

// =============================================================================
// CONFETTI
// =============================================================================
function launchConfetti() {
  const colors = ['#ff0066', '#b300ff', '#ffd700', '#00ff88', '#ff6600', '#00d4ff'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * .5) + 's';
    el.style.borderRadius = Math.random() > .5 ? '50%' : '0';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// =============================================================================
// NOTIFICACIONES
// =============================================================================
function notif(msg, type) {
  const el = document.getElementById('notif');
  document.getElementById('notif-text').textContent = msg;
  el.className = `notif ${type || 'success'}`;
  el.style.display = 'flex';
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(cerrarNotif, 4000);
}
function cerrarNotif() {
  const el = document.getElementById('notif');
  el.classList.remove('show');
  setTimeout(() => el.style.display = 'none', 400);
}

// =============================================================================
// PANTALLA ERROR / HELPERS
// =============================================================================
function showError(msg) {
  document.getElementById('screen-loading').style.display = 'none';
  const screen = document.getElementById('screen-error');
  document.getElementById('error-msg').textContent = msg;
  screen.style.display = 'flex';
}

function setText(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}
</script>
