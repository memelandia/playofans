<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayOFans — Ruleta</title>
<meta name="description" content="Gira la ruleta y gana premios exclusivos">
<meta property="og:title" content="PlayOFans — Ruleta">
<meta property="og:description" content="Gira la ruleta y gana premios exclusivos">
<meta property="og:url" content="">
<meta property="og:type" content="website">
<meta property="og:site_name" content="PlayOFans">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES — se sobreescriben por tema
   ============================================= */
:root {
  --bg-fondo-a: #1a0a1e;
  --bg-fondo-b: #2d1b3d;
  --bg-fondo-c: #1e0a28;
  --accent-principal: #ff0066;
  --accent-secundario: #b300ff;
  --texto-oscuro: #ffffff;
  --texto-suave: #e0b3ff;
  --glass-white: rgba(30, 10, 40, 0.85);
  --glass-border: rgba(179, 0, 255, 0.3);
  --accent-soft: rgba(255, 0, 102, 0.15);
  --accent-border: rgba(255, 0, 102, 0.5);
  --font: 'Poppins', sans-serif;
  --font-display: 'Dancing Script', cursive;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  text-align: center;
  min-height: 100vh;
  color: var(--texto-oscuro);
  background: linear-gradient(-45deg, var(--bg-fondo-a), var(--bg-fondo-b), var(--bg-fondo-c), var(--bg-fondo-b), var(--bg-fondo-a));
  background-size: 400% 400%;
  animation: gradientMove 10s ease-in-out infinite;
  overflow-x: hidden;
}

body.force-dark { color-scheme: dark; }

/* =============================================
   ANIMACIONES
   ============================================= */
@keyframes gradientMove {
  0%   { background-position: 0% 50%; }
  25%  { background-position: 100% 50%; }
  50%  { background-position: 100% 100%; }
  75%  { background-position: 0% 100%; }
  100% { background-position: 0% 50%; }
}
@keyframes float {
  0%   { transform: translateY(0) rotate(0deg); }
  33%  { transform: translateY(-20px) rotate(45deg); }
  66%  { transform: translateY(15px) rotate(-30deg); }
  100% { transform: translateY(0) rotate(0deg); }
}
@keyframes floatHeart {
  0%, 100% { transform: translateY(0) scale(1) rotate(0deg); opacity: .4; }
  33% { transform: translateY(-50px) scale(1.2) rotate(15deg); opacity: .8; }
  66% { transform: translateY(-30px) scale(.8) rotate(-10deg); opacity: .6; }
}
@keyframes floatSparkle {
  0%, 100% { transform: translateY(0) scale(1); opacity: .5; box-shadow: 0 0 10px var(--accent-secundario); }
  50% { transform: translateY(-40px) scale(1.5); opacity: 1; box-shadow: 0 0 20px var(--accent-principal); }
}
@keyframes floatStar {
  0%, 100% { transform: translateY(0) rotate(0deg) scale(1); opacity: .4; }
  25% { transform: translateY(-35px) rotate(180deg) scale(1.1); opacity: .7; }
  50% { transform: translateY(-60px) rotate(360deg) scale(.9); opacity: .9; }
  75% { transform: translateY(-25px) rotate(540deg) scale(1.2); opacity: .6; }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px) scale(.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* =============================================
   FONDO Y PARTICULAS
   ============================================= */
.bg-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
.shape {
  position: absolute; border-radius: 50%; opacity: .08;
  animation: float 15s ease-in-out infinite;
}
.shape:nth-child(1) { width: 80px; height: 80px; background: var(--accent-principal); top: 10%; left: 10%; }
.shape:nth-child(2) { width: 120px; height: 120px; background: var(--accent-secundario); top: 20%; right: 15%; animation-delay: 2s; }
.shape:nth-child(3) { width: 60px; height: 60px; background: var(--bg-fondo-c); bottom: 20%; left: 20%; animation-delay: 4s; }
.shape:nth-child(4) { width: 100px; height: 100px; background: var(--accent-principal); bottom: 10%; right: 10%; animation-delay: 1s; }

.particle { position: absolute; pointer-events: none; opacity: .6; }
.particle.heart { font-size: 20px; color: var(--accent-principal); animation: floatHeart 10s ease-in-out infinite; }
.particle.sparkle { width: 8px; height: 8px; background: radial-gradient(circle, var(--accent-secundario), var(--accent-principal)); border-radius: 50%; animation: floatSparkle 6s ease-in-out infinite; }
.particle.star { font-size: 16px; color: var(--accent-secundario); animation: floatStar 12s ease-in-out infinite; }

/* =============================================
   LAYOUT
   ============================================= */
.container {
  position: relative; z-index: 1; padding: 20px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; max-width: 1400px; margin: 0 auto; gap: 20px;
}
.main-content {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; max-width: 1200px; flex: 1; gap: 40px;
}

/* =============================================
   CONTROLES (columna izquierda)
   ============================================= */
.controls-container { display: flex; flex-direction: column; align-items: center; gap: 25px; }
.controls-section {
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  background: var(--glass-white); padding: 35px; border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,.1); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); width: 320px;
}
.controls-title {
  font-family: var(--font-display); color: var(--accent-secundario);
  font-size: 2.5rem; font-weight: 700;
  text-shadow: 0 4px 15px rgba(0,0,0,.4), 0 0 10px rgba(255,255,255,.3);
}
.form-title {
  font-family: var(--font-display); font-size: 1.6rem;
  color: var(--accent-secundario); margin-bottom: 10px;
  text-shadow: 2px 2px 5px rgba(0,0,0,.15);
}

#codigo {
  padding: 18px 20px; font-size: 1.1rem;
  border: 3px solid var(--accent-principal); border-radius: 20px;
  width: 100%; text-align: center; transition: all .3s;
  background: var(--glass-white); font-weight: 600;
  color: var(--texto-oscuro); text-transform: uppercase;
}
#codigo::placeholder { color: var(--texto-suave); opacity: .6; text-transform: none; }
#codigo:focus {
  outline: none; box-shadow: 0 0 30px rgba(255,79,163,.5);
  border-color: var(--accent-secundario); transform: translateY(-2px);
}

.btn {
  padding: 15px 25px; font-size: 1rem;
  background: linear-gradient(45deg, var(--accent-principal), var(--accent-secundario));
  color: #fff; border: none; border-radius: 20px; cursor: pointer;
  font-weight: 600; width: 100%; text-transform: uppercase;
  transition: all .3s; box-shadow: 0 4px 15px rgba(0,0,0,.2);
  font-family: var(--font);
}
.btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.3); filter: brightness(1.1); }
.btn:disabled { background: linear-gradient(45deg, #555, #333); cursor: not-allowed; opacity: .6; }

#girarBtn {
  padding: 18px 50px; font-size: 1.2rem; font-weight: 700;
  min-width: 280px; border-radius: 30px;
  box-shadow: 0 6px 20px rgba(0,0,0,.3);
  text-shadow: 1px 1px 3px rgba(0,0,0,.3);
}
#girarBtn:hover:not(:disabled) { transform: translateY(-4px) scale(1.02); }

/* Info tiradas y expiracion */
.spins-info {
  display: none; width: 100%; text-align: center;
  font-weight: 600; color: var(--texto-suave); font-size: .95rem;
  padding: 10px; border-radius: 12px;
  background: var(--accent-soft); border: 1px solid var(--accent-border);
}
.spins-info.visible { display: block; }
.countdown { color: var(--accent-principal); font-weight: 700; }

/* =============================================
   RULETA CANVAS
   ============================================= */
.ruleta-section { display: flex; flex-direction: column; align-items: center; gap: 30px; flex-shrink: 0; }

#ruleta {
  margin: 0 auto; width: 450px; height: 450px;
  border: 10px solid var(--accent-principal);
  border-radius: 50%; position: relative;
  box-shadow: 0 15px 30px rgba(0,0,0,.2);
  overflow: hidden;
  background: linear-gradient(135deg, var(--accent-principal), var(--accent-secundario));
}

#flecha {
  width: 0; height: 0;
  border-left: 25px solid transparent; border-right: 25px solid transparent;
  border-bottom: 50px solid var(--accent-principal);
  position: absolute; left: 50%; top: -50px; transform: translateX(-50%);
  z-index: 15;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
}

#opciones {
  position: absolute; width: 100%; height: 100%;
  top: 0; left: 0; pointer-events: none;
  border-radius: 50%; z-index: 10;
}

#opciones.is-idling {
  animation: slowRotate 30s linear infinite;
}

/* =============================================
   HISTORIAL (columna derecha)
   ============================================= */
.historial-container { display: flex; flex-direction: column; align-items: center; gap: 25px; }
.historial-section {
  background: var(--glass-white); padding: 25px; border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,.1); backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border); width: 320px; max-height: 500px;
}
.historial-title {
  font-family: var(--font-display); color: var(--accent-secundario);
  font-size: 2rem; font-weight: 700;
  text-shadow: 0 4px 15px rgba(0,0,0,.4), 0 0 10px rgba(255,255,255,.3);
  margin-bottom: 20px; text-align: center;
}
.historial-lista { max-height: 380px; overflow-y: auto; padding-right: 10px; }
.historial-lista::-webkit-scrollbar { width: 8px; }
.historial-lista::-webkit-scrollbar-track { background: rgba(255,255,255,.1); border-radius: 10px; }
.historial-lista::-webkit-scrollbar-thumb { background: linear-gradient(45deg, var(--accent-principal), var(--accent-secundario)); border-radius: 10px; }

.premio-item {
  background: linear-gradient(135deg, var(--accent-soft), rgba(122,92,255,.08));
  border: 2px solid var(--accent-border); border-radius: 15px;
  padding: 15px; margin-bottom: 12px; transition: all .3s;
  position: relative; overflow: hidden;
}
.premio-item:hover { transform: translateX(5px); box-shadow: 0 8px 20px rgba(0,0,0,.15); }
.premio-item::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  transition: left .5s;
}
.premio-item:hover::before { left: 100%; }
.premio-nombre { font-weight: 700; color: var(--accent-secundario); font-size: .95rem; margin-bottom: 5px; }
.premio-fecha { font-size: .8rem; color: var(--texto-suave); font-weight: 500; display: flex; align-items: center; gap: 5px; }
.premio-numero {
  position: absolute; top: 8px; right: 12px;
  background: linear-gradient(45deg, var(--accent-principal), var(--accent-secundario));
  color: #fff; border-radius: 50%; width: 25px; height: 25px;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: bold;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.historial-vacio {
  text-align: center; color: var(--texto-suave); font-style: italic;
  padding: 30px 20px; background: rgba(255,255,255,.05);
  border-radius: 15px; border: 2px dashed var(--accent-border);
}
.historial-vacio::before { content: '🎁'; display: block; font-size: 2rem; margin-bottom: 10px; opacity: .5; }

/* =============================================
   MENSAJE
   ============================================= */
.message-section { width: 100%; max-width: 600px; }
#mensaje {
  font-size: 1.1rem; color: var(--accent-secundario); font-weight: 600;
  background: var(--glass-white); padding: 15px 25px; border-radius: 20px;
  display: inline-block; box-shadow: 0 8px 20px rgba(0,0,0,.15);
  backdrop-filter: blur(10px); border: 2px solid var(--glass-border);
  min-height: 35px; transition: all .3s;
}

/* =============================================
   POPUP PREMIO
   ============================================= */
.popup-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.5); backdrop-filter: blur(8px);
  display: flex; justify-content: center; align-items: center;
  z-index: 1000; opacity: 0; visibility: hidden; transition: all .3s;
}
.popup-overlay.show { opacity: 1; visibility: visible; }
.popup-content {
  background: linear-gradient(135deg, var(--accent-principal), var(--accent-secundario));
  border-radius: 30px; padding: 40px; text-align: center;
  max-width: 500px; width: 90%;
  transform: scale(.5); transition: all .4s cubic-bezier(.68,-.55,.27,1.55);
}
.popup-overlay.show .popup-content { transform: scale(1); }
.popup-title { font-family: var(--font-display); font-size: 3rem; color: #fff; margin-bottom: 20px; }
.popup-prize { font-size: 1.5rem; color: #fff; font-weight: 700; margin: 20px 0; padding: 15px; background: rgba(255,255,255,.2); border-radius: 15px; }
.popup-message { font-size: .95rem; color: #fff; opacity: .9; margin-top: 15px; font-weight: 500; }
.popup-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
.popup-btn {
  background: #fff; color: var(--accent-secundario); border: none;
  padding: 15px 30px; border-radius: 25px; font-weight: 700;
  font-size: 1.1rem; cursor: pointer; font-family: var(--font);
  transition: all .3s;
}
.popup-btn:hover { transform: scale(1.05); }
.popup-btn.share { background: rgba(255,255,255,.2); color: #fff; font-size: .9rem; padding: 10px 20px; }

/* =============================================
   NOTIFICACION
   ============================================= */
.notif {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 10000;
  display: none; transform: translateY(-100%); transition: transform .3s;
}
.notif.show { transform: translateY(0); }
.notif.success { background: linear-gradient(135deg, var(--accent-secundario), var(--accent-principal)); }
.notif.error { background: linear-gradient(135deg, #d9534f, #c9302c); }
.notif-inner { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; max-width: 1200px; margin: 0 auto; }
.notif-text { color: #fff; font-weight: 600; flex: 1; }
.notif-close { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; padding: 0 10px; opacity: .8; }
.notif-close:hover { opacity: 1; }

/* =============================================
   CONTROLES SUPERIORES (mute)
   ============================================= */
.top-controls {
  position: fixed; top: 15px; right: 15px; z-index: 100;
  display: flex; gap: 10px;
}
.top-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--glass-white); border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px); display: flex; align-items: center;
  justify-content: center; font-size: 1.3rem; cursor: pointer;
  transition: all .3s; color: var(--texto-oscuro);
}
.top-btn:hover { transform: scale(1.1); background: var(--accent-soft); }

/* =============================================
   PANTALLA ERROR / CARGA
   ============================================= */
.screen-error, .screen-loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 2000;
  background: linear-gradient(-45deg, var(--bg-fondo-a), var(--bg-fondo-b), var(--bg-fondo-c));
}
.screen-error h1 { font-size: 4rem; margin-bottom: 20px; }
.screen-error p { font-size: 1.3rem; color: var(--texto-suave); max-width: 400px; }
.screen-loading .spinner-lg {
  width: 60px; height: 60px; border: 4px solid var(--glass-border);
  border-top-color: var(--accent-principal); border-radius: 50%;
  animation: spin 1s linear infinite;
}

/* Confetti CSS fallback */
.confetti-piece {
  position: fixed; width: 10px; height: 10px; top: -10px;
  z-index: 999; pointer-events: none;
  animation: confettiFall 3s ease-in forwards;
}

/* =============================================
   RESPONSIVE
   ============================================= */
@media (min-width: 992px) {
  .main-content {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 60px;
  }
  .controls-container { grid-column: 1; justify-self: end; }
  .ruleta-section { grid-column: 2; }
  .historial-container { grid-column: 3; justify-self: start; display: none; }
  .historial-container.visible { display: flex; }
}

@media (max-width: 991px) {
  .main-content {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 15px; align-items: start; justify-items: center;
  }
  .controls-container { grid-column: 1; }
  .historial-container { grid-column: 2; }
  .ruleta-section { grid-column: 1 / -1; }
  .controls-section, .historial-section { width: 100%; max-width: 280px; padding: 15px; }
  .controls-title { font-size: 2.2rem; }
  .historial-title { font-size: 1.8rem; }
  #ruleta { width: 400px; height: 400px; border-width: 8px; }
  #flecha { border-left-width: 22px; border-right-width: 22px; border-bottom-width: 45px; top: -45px; }
  #girarBtn { min-width: 250px; padding: 16px 40px; font-size: 1.1rem; }
}

@media (max-width: 768px) {
  .container { padding: 15px; gap: 15px; }
  #ruleta { width: 350px; height: 350px; border-width: 7px; }
  #flecha { border-left-width: 20px; border-right-width: 20px; border-bottom-width: 40px; top: -40px; }
  .controls-title { font-size: 2rem; }
  .form-title { font-size: 1.4rem; }
  #codigo { font-size: .95rem; padding: 15px 18px; }
  #mensaje { font-size: 1rem; padding: 12px 20px; }
  .popup-content { padding: 30px; max-width: 400px; }
  .popup-title { font-size: 2.5rem; }
}

@media (max-width: 480px) {
  .main-content { grid-template-columns: 1fr; }
  .controls-container, .historial-container { grid-column: 1; }
  .controls-section, .historial-section { max-width: 100%; width: 100%; }
  #ruleta { width: 300px; height: 300px; border-width: 6px; }  /* Nota: en el original la flecha se achica pero no desaparece */
  #flecha { border-left-width: 18px; border-right-width: 18px; border-bottom-width: 35px; top: -35px; }
  .controls-title { font-size: 1.8rem; }
  #girarBtn { min-width: 200px; padding: 14px 30px; font-size: .95rem; }
  .popup-content { padding: 25px; max-width: 340px; }
  .popup-title { font-size: 2.2rem; }
  .shape:nth-child(1) { width: 50px; height: 50px; }
  .shape:nth-child(2) { width: 70px; height: 70px; }
  .shape:nth-child(3) { width: 40px; height: 40px; }
  .shape:nth-child(4) { width: 60px; height: 60px; }
  .particle.heart { font-size: 16px; }
  .particle.sparkle { width: 6px; height: 6px; }
  .particle.star { font-size: 12px; }
}

@media (max-width: 360px) {
  #ruleta { width: 260px; height: 260px; border-width: 5px; }
  .controls-title { font-size: 1.6rem; }
  #girarBtn { min-width: 180px; padding: 12px 25px; font-size: .85rem; }
}
</style>
</head>
<body>

<!-- Pantalla de carga -->
<div class="screen-loading" id="screen-loading">
  <div style="text-align:center">
    <div style="font-size:3rem;margin-bottom:20px">🎰</div>
    <div>Cargando ruleta...</div>
    <div class="spinner-lg" style="margin-top:20px"></div>
  </div>
</div>

<!-- Pantalla de error -->
<div class="screen-error" id="screen-error" style="display:none">
  <h1 id="error-emoji">😢</h1>
  <p id="error-msg">Error</p>
</div>

<!-- Notificacion -->
<div class="notif" id="notif">
  <div class="notif-inner">
    <span class="notif-text" id="notif-text"></span>
    <button class="notif-close" id="notif-close">&times;</button>
  </div>
</div>

<!-- Popup premio -->
<div class="popup-overlay" id="popup">
  <div class="popup-content">
    <div class="popup-title" id="popup-title">¡FELICIDADES!</div>
    <div class="popup-prize" id="popup-prize"></div>
    <div class="popup-message" id="popup-message"></div>
    <div class="popup-buttons">
      <button class="popup-btn" id="popup-close-btn">✨ ¡Genial! ✨</button>
      <button class="popup-btn share" id="popup-share-btn">📤 Compartir</button>
    </div>
  </div>
</div>

<!-- Fondo -->
<div class="bg-shapes">
  <div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div>
</div>

<!-- Controles superiores -->
<div class="top-controls">
  <button class="top-btn" id="btn-mute" title="Silenciar">🔊</button>
</div>

<!-- Contenido principal -->
<div class="container">
  <div class="main-content">

    <!-- COLUMNA IZQUIERDA: Controles -->
    <div class="controls-container">
      <div class="controls-title" id="model-name">PlayOFans</div>
      <div class="controls-section">
        <div class="form-title" id="form-title">💝 Codigo Exclusivo</div>
        <div id="form-code">
          <input type="text" id="codigo" placeholder="Introduce tu codigo" maxlength="20" autocomplete="off">
          <button class="btn" id="validarBtn" style="margin-top:12px">✨ Validar Código ✨</button>
        </div>
        <div class="spins-info" id="spins-info"></div>
      </div>
    </div>

    <!-- COLUMNA CENTRAL: Ruleta (Canvas) -->
    <div class="ruleta-section">

// =============================================================================
// getCurrentRotation — EXACT from original
// =============================================================================
function getCurrentRotation(element) {
    const st = window.getComputedStyle(element, null);
    const tm = st.getPropertyValue("-webkit-transform") ||
               st.getPropertyValue("-moz-transform") ||
               st.getPropertyValue("-ms-transform") ||
               st.getPropertyValue("-o-transform") ||
               st.getPropertyValue("transform") ||
               "none";
    if (tm !== "none") {
        const values = tm.split('(')[1].split(')')[0].split(',');
        const a = values[0];
        const b = values[1];
        const angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
        return (angle < 0) ? angle + 360 : angle;
    }
    return 0;
}

// =============================================================================
// DIBUJAR RULETA COMPLETA — Canvas
// =============================================================================
function dibujarRuletaCompleta() {
  const canvas = document.getElementById('opciones');
  const ctx = canvas.getContext('2d');
  const n = premiosActuales.length;
  if (n < 2) return;

  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const r = Math.min(cx, cy) - 5;

  ctx.clearRect(0, 0, w, h);

  const sliceAngle = (2 * Math.PI) / n;
  const colors = currentTheme.sliceColors;

  for (let i = 0; i < n; i++) {
    const startAngle = sliceAngle * i;
    const endAngle = startAngle + sliceAngle;
    const color = colors[i % colors.length];

    // Draw slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Slice border
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Draw text
    ctx.save();
    const midAngle = startAngle + sliceAngle / 2;
    const textR = r * 0.65;
    const tx = cx + textR * Math.cos(midAngle);
    const ty = cy + textR * Math.sin(midAngle);

    ctx.translate(tx, ty);
    let rotacion = midAngle;
    if (rotacion > Math.PI/2 && rotacion < 3*Math.PI/2) rotacion += Math.PI;
    ctx.rotate(rotacion);

    // Clean text (remove emojis)
    const clean = premiosActuales[i].replace(/[\u{1F300}-\u{1F9FF}]/gu, '').trim().toUpperCase();
    const words = clean.split(' ');
    let lines = [];
    let line = '';
    words.forEach(w => {
      if ((line + w).length > 10 && line) {
        lines.push(line.trim());
        line = w + ' ';
      } else {
        line += w + ' ';
      }
    });
    lines.push(line.trim());

    const fontSize = n > 6 ? 11 : 14;
    ctx.font = `bold ${fontSize}px Poppins, sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Text shadow effect
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 3;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;

    const lineH = fontSize + 3;
    const startY = -(lines.length - 1) * lineH / 2;

    lines.forEach((l, j) => {
      ctx.fillText(l, 0, startY + j * lineH);
    });

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, 2 * Math.PI);
  ctx.fillStyle = currentTheme.accent;
  ctx.globalAlpha = 0.8;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Center emoji
  ctx.font = '32px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(currentTheme.emoji, cx, cy);
}

document.addEventListener('DOMContentLoaded', init);

async function init() {
  // Extract slug from URL: /xvickyluna/ruleta -> "xvickyluna"
  const parts = window.location.pathname.split('/').filter(Boolean);
  slug = parts[0] || '';

  if (!slug) return showError('Modelo no encontrado');

  // Preloaded code from ?c=XXXX
  const params = new URLSearchParams(window.location.search);
  const preCode = params.get('c');

  // Event listeners
  document.getElementById('validarBtn').addEventListener('click', validarCodigo);
  document.getElementById('codigo').addEventListener('keydown', e => { if (e.key === 'Enter') validarCodigo(); });
  document.getElementById('girarBtn').addEventListener('click', girarRuleta);
  document.getElementById('popup-close-btn').addEventListener('click', cerrarPopup);
  document.getElementById('popup-share-btn').addEventListener('click', compartirPremio);
  document.getElementById('btn-mute').addEventListener('click', toggleMute);
  document.getElementById('notif-close').addEventListener('click', cerrarNotif);

  // Load tenant config
  try {
    const res = await fetch(`/api/tenant-config?slug=${slug}`);
    const data = await res.json();

    if (res.status === 404) return showError('Modelo no encontrado');
    if (res.status === 403) return showError(data.error || 'Esta ruleta no esta disponible');
    if (!res.ok) return showError(data.error || 'Esta ruleta no esta disponible');

    config = data;
    premiosActuales = data.prizes || [];
    premiosDisponibles = [...premiosActuales];

    applyTheme(data.theme || 'dark_luxury');
    updateOGTags(data);

    document.getElementById('model-name').textContent = data.display_name || slug;

    isMuted = !data.sound_enabled_default;
    document.getElementById('btn-mute').textContent = isMuted ? '🔇' : '🔊';

    if (data.force_dark_mode) document.body.classList.add('force-dark');

    dibujarRuletaCompleta();
    createParticles();

    // Add idling class
    document.getElementById('opciones').classList.add('is-idling');

    // Hide loading screen
    document.getElementById('screen-loading').style.display = 'none';

    // If preloaded code
    if (preCode) {
      document.getElementById('codigo').value = preCode;
      validarCodigo();
    }

    // Recovery: check pending token in localStorage
    const savedRaw = localStorage.getItem(`pof_token_${slug}`);
    if (savedRaw) {
      try {
        const parsed = JSON.parse(savedRaw);
        if (parsed.code === codigoActual) {
          // Token still pending — will be recovered on next spin
        } else {
          localStorage.removeItem(`pof_token_${slug}`);
        }
      } catch (e) {
        localStorage.removeItem(`pof_token_${slug}`);
      }
    }

  } catch (err) {
    showError('Esta ruleta no esta disponible 🎰');
  }
}

// =============================================================================
// VALIDAR CODIGO
// =============================================================================
async function validarCodigo() {
    if (!isMuted) soundClick.play().catch(()=>{});
    const codigoInput = document.getElementById('codigo');
    const validarBtn = document.getElementById('validarBtn');
    const codigo = codigoInput.value.trim().toUpperCase();

    if (!codigo) {
        mostrarMensaje("❌ Por favor ingresa un código.");
        codigoInput.style.animation = 'shake 0.5s ease-in-out';
        setTimeout(() => codigoInput.style.animation = '', 500);
        return;
    }

    validarBtn.disabled = true;
    validarBtn.textContent = '⏳ Validando...';
    mostrarMensaje("🔍 Validando tu código...");

    try {
        const response = await fetch('/api/validate-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ slug: slug, codigoId: codigo, fanName: '' })
        });
        const data = await response.json();

        if (!response.ok) {
            mostrarNotificacion(data.error || 'Codigo no valido', 'error');
            mostrarMensaje(`❌ ${data.error || 'Codigo no valido'}`);
            codigoInput.style.animation = 'shake 0.5s ease-in-out';
            setTimeout(() => codigoInput.style.animation = '', 500);
            validarBtn.disabled = false;
            validarBtn.textContent = '✨ Validar Código ✨';
            return;
        }

        // Success
        codigoActual = codigo;
        nombreUsuario = data.fan_name;
        tiradasRestantes = data.remaining_spins;
        totalSpins = data.total_spins;

        // Prizes from code or global
        if (data.prizes && Array.isArray(data.prizes) && data.prizes.length >= 2) {
            premiosActuales = [...data.prizes];
            premiosDisponibles = [...data.prizes];
            dibujarRuletaCompleta();
        }

        // Expires at
        if (data.expires_at) expiresAt = new Date(data.expires_at);

        mostrarNotificacion(`¡Bienvenid@ ${nombreUsuario}! Código válido con ${tiradasRestantes} tirada(s) 🎉`, 'success');

        // Show welcome message
        if (data.welcome_message) {
            mostrarMensaje(data.welcome_message);
        } else {
            mostrarMensaje(`💖 ¡Hola ${nombreUsuario}! Tienes ${tiradasRestantes} tirada(s). ¡Mucha suerte!`);
        }

        // Enable spin button
        const girarBtn = document.getElementById('girarBtn');
        if (tiradasRestantes > 0) {
            girarBtn.disabled = false;
            girarBtn.textContent = '✨ Girar Ruleta ✨';
        } else {
            girarBtn.disabled = true;
            girarBtn.textContent = '😢 Sin tiradas';
            mostrarMensaje('Ya usaste todas tus tiradas. Estos fueron tus premios:');
        }

        // Disable code form
        codigoInput.disabled = true;
        validarBtn.disabled = true;
        codigoInput.style.borderColor = '#10ac84';
        validarBtn.style.background = 'linear-gradient(45deg, #10ac84, #00d2d3)';
        validarBtn.textContent = '✅ Código Válido';

        // Init history and show
        inicializarHistorial();
        actualizarTiradasInfo();
        iniciarCountdown();

    } catch (error) {
        mostrarNotificacion("Error de conexión. Inténtalo de nuevo.", 'error');
        mostrarMensaje("❌ Error de conexión.");
        validarBtn.disabled = false;
        validarBtn.textContent = '✨ Validar Código ✨';
    }
}

// =============================================================================
// GIRAR RULETA — server-side flow with EXACT animation from original
// =============================================================================
async function girarRuleta() {
    if (isSpinning || tiradasRestantes <= 0 || premiosActuales.length === 0) return;
    isSpinning = true;

    const girarBtn = document.getElementById('girarBtn');
    girarBtn.disabled = true;
    girarBtn.textContent = 'Girando... 🎲';

    soundSpin.loop = true;
    if (!isMuted) soundSpin.play().catch(()=>{});

    mostrarMensaje("🎯 ¡La ruleta está girando! ✨");

    try {
        // 1. Call prepare-spin (server picks the prize)
        const res = await fetch('/api/prepare-spin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codigoId: codigoActual, slug: slug })
        });
        const data = await res.json();

        if (!res.ok) {
            mostrarNotificacion(data.error || 'Error al preparar la tirada', 'error');
            mostrarMensaje(data.error || 'Error');
            resetearBotonGirar();
            return;
        }

        const { prize, wheelIndex, token, recovered } = data;

        // Save token for recovery
        localStorage.setItem(`pof_token_${slug}`, JSON.stringify({ token, code: codigoActual }));

        if (recovered) mostrarNotificacion('Recuperando tirada anterior...', 'success');

        // 2. EXACT animation block from original
        const opcionesCanvas = document.getElementById('opciones');
        const currentAngle = getCurrentRotation(opcionesCanvas);
        opcionesCanvas.classList.remove('is-idling');
        opcionesCanvas.style.transition = 'none';
        opcionesCanvas.style.transform = `rotate(${currentAngle}deg)`;

        // Force reflow
        opcionesCanvas.offsetWidth;

        // Calculate final angle
        const anguloPorPremio = 360 / premiosActuales.length;
        const anguloDeGiro = (360 * 6) + (wheelIndex * anguloPorPremio) + (anguloPorPremio / 2);
        const anguloFinalTotal = currentAngle + anguloDeGiro;

        // Apply transition
        opcionesCanvas.style.transition = "transform 5s cubic-bezier(.17,.67,.83,.67)";
        opcionesCanvas.style.transform = `rotate(${anguloFinalTotal}deg)`;

        // 3. After 5200ms, process result
        setTimeout(async () => {
            soundSpin.pause();
            soundSpin.currentTime = 0;
            if (!isMuted) soundWin.play().catch(()=>{});

            opcionesCanvas.style.transition = 'none';

            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, gravity: 0.8 });

            // Confirm spin
            try {
                const confirmRes = await fetch('/api/confirm-spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const confirmData = await confirmRes.json();
                if (confirmRes.ok && confirmData.success) {
                    tiradasRestantes = confirmData.remaining_spins;
                }
            } catch (e) {
                console.error('Error confirming spin:', e);
            }

            // Clean token
            localStorage.removeItem(`pof_token_${slug}`);

            // Show result
            const postMsg = (config.post_prize_message || '').replace(/\{nombre\}/gi, nombreUsuario);
            mostrarPopupPremio(prize, postMsg);
            mostrarMensaje(`🎉 ¡Felicidades ${nombreUsuario}! Ganaste: <b>${prize}</b>`);
            agregarPremioAlHistorial(prize);
            actualizarTiradasInfo();

            // Reset button after 3s
            setTimeout(() => {
                resetearBotonGirar();
            }, 3000);

        }, 5200);

    } catch (err) {
        soundSpin.pause();
        soundSpin.currentTime = 0;
        mostrarNotificacion('Error de conexion. Tu tirada esta guardada.', 'error');
        resetearBotonGirar();
    }
}

// =============================================================================
// RESET BOTON GIRAR
// =============================================================================
function resetearBotonGirar() {
    isSpinning = false;
    const btn = document.getElementById('girarBtn');
    if (tiradasRestantes > 0) {
        btn.disabled = false;
        btn.textContent = '✨ Girar Ruleta ✨';
        mostrarMensaje(`✨ ¡Tienes ${tiradasRestantes} tirada(s) más! ¡Mucha suerte!`);
    } else {
        btn.disabled = true;
        btn.textContent = '😢 Sin tiradas';
        mostrarMensaje(`🌟 ¡Gracias por participar ${nombreUsuario}! 💖`);
    }
}

// =============================================================================
// ACTUALIZAR TIRADAS INFO
// =============================================================================
function actualizarTiradasInfo() {
    const el = document.getElementById('spins-info');
    if (!el) return;
    const word = tiradasRestantes === 1 ? 'tirada' : 'tiradas';
    el.innerHTML = `Te quedan <strong>${tiradasRestantes}</strong> ${word}`;
    el.classList.add('visible');
}

// =============================================================================
// COUNTDOWN
// =============================================================================
let countdownInterval;
function iniciarCountdown() {
    if (!expiresAt) return;
    clearInterval(countdownInterval);
    function update() {
        const diff = expiresAt - Date.now();
        if (diff <= 0) {
            const el = document.getElementById('spins-info');
            if (el) el.innerHTML += ' <span class="countdown">⏰ Código expirado</span>';
            clearInterval(countdownInterval);
            return;
        }
        if (diff < 72 * 3600 * 1000) {
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const el = document.getElementById('spins-info');
            const word = tiradasRestantes === 1 ? 'tirada' : 'tiradas';
            if (el) el.innerHTML = `Te quedan <strong>${tiradasRestantes}</strong> ${word} <span class="countdown">⏰ Expira en ${h}h ${m}m</span>`;
        }
    }
    update();
    countdownInterval = setInterval(update, 60000);
}

// =============================================================================
// POPUP
// =============================================================================
function mostrarPopupPremio(prize, message) {
    document.getElementById('popup-title').textContent = '¡FELICIDADES!';
    document.getElementById('popup-prize').textContent = prize;
    document.getElementById('popup-message').textContent = message || '';
    document.getElementById('popup').classList.add('show');
}

function cerrarPopup() {
    document.getElementById('popup').classList.remove('show');
    // Restore idling if not spinning
    if (!isSpinning) {
        const opcionesCanvas = document.getElementById('opciones');
        opcionesCanvas.classList.add('is-idling');
        opcionesCanvas.style.transition = 'none';
        opcionesCanvas.style.transform = '';
    }
}

// =============================================================================
// COMPARTIR (Canvas API)
// =============================================================================
async function compartirPremio() {
    const prize = document.getElementById('popup-prize').textContent;
    const name = config?.display_name || slug;
    const theme = currentTheme;
    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 400;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 600, 400);
    grad.addColorStop(0, theme.bgA);
    grad.addColorStop(1, theme.bgB);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 28px Poppins, sans-serif';
    ctx.fillText(`${theme.emoji} ${name}`, 300, 80);
    ctx.font = 'bold 22px Poppins, sans-serif';
    ctx.fillText('¡Gané en la ruleta!', 300, 140);
    ctx.font = 'bold 36px Poppins, sans-serif';
    ctx.fillStyle = theme.accent;
    ctx.fillText(prize, 300, 220);
    ctx.font = '16px Poppins, sans-serif';
    ctx.fillStyle = theme.textSoft;
    ctx.fillText('playofans.com/' + slug + '/ruleta', 300, 340);
    canvas.toBlob(async blob => {
        if (navigator.share && navigator.canShare) {
            try {
                const file = new File([blob], 'premio.png', { type: 'image/png' });
                await navigator.share({ files: [file], text: `¡Gané "${prize}" en la ruleta de ${name}!` });
            } catch (e) {}
        } else {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'premio.png';
            a.click();
        }
    }, 'image/png');
}

// =============================================================================
// SONIDOS
// =============================================================================
function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('btn-mute').textContent = isMuted ? '🔇' : '🔊';
    if (isMuted) {
        soundClick.pause(); soundClick.currentTime = 0;
        soundSpin.pause(); soundSpin.currentTime = 0;
        soundWin.pause(); soundWin.currentTime = 0;
    }
}

// =============================================================================
// PARTICULAS
// =============================================================================
function createParticles() {
    const container = document.querySelector('.bg-shapes');
    const types = ['heart', 'sparkle', 'star'];
    const emojis = { heart: '💖', star: '✨' };

    for (let i = 0; i < 15; i++) {
        const type = types[i % types.length];
        const el = document.createElement('div');
        el.className = `particle ${type}`;
        el.style.left = Math.random() * 100 + '%';
        el.style.top = Math.random() * 100 + '%';
        el.style.animationDelay = (Math.random() * 5) + 's';
        if (emojis[type]) el.textContent = emojis[type];
        container.appendChild(el);
    }
}

// Mouse particles
document.addEventListener('mousemove', (function() {
    let lastTime = 0;
    return function(e) {
        const now = Date.now();
        if (now - lastTime < 80) return;
        lastTime = now;
        const particle = document.createElement('div');
        particle.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:9999;background:var(--accent-principal);opacity:0.7;transition:all 0.6s ease-out;`;
        document.body.appendChild(particle);
        requestAnimationFrame(() => {
            particle.style.transform = `translate(${(Math.random()-0.5)*40}px, ${(Math.random()-0.5)*40}px) scale(0)`;
            particle.style.opacity = '0';
        });
        setTimeout(() => particle.remove(), 700);
    };
})());

// =============================================================================
// PANTALLA ERROR
// =============================================================================
function showError(msg) {
    document.getElementById('screen-loading').style.display = 'none';
    const screen = document.getElementById('screen-error');
    document.getElementById('error-msg').textContent = msg;
    screen.style.display = 'flex';
}

// =============================================================================
// RESIZE HANDLER — redraw canvas on resize
// =============================================================================
window.addEventListener('resize', (function() {
    let resizeTimer;
    return function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (premiosActuales.length >= 2) {
                dibujarRuletaCompleta();
            }
        }, 250);
    };
})());
</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
