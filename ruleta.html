// =============================================================================
// getCurrentRotation ‚Äî EXACT from original
// =============================================================================
function getCurrentRotation(element) {
    const st = window.getComputedStyle(element, null);
    const tm = st.getPropertyValue("-webkit-transform") ||
               st.getPropertyValue("-moz-transform") ||
               st.getPropertyValue("-ms-transform") ||
               st.getPropertyValue("-o-transform") ||
               st.getPropertyValue("transform") ||
               "none";
    if (tm !== "none") {
        const values = tm.split('(')[1].split(')')[0].split(',');
        const a = values[0];
        const b = values[1];
        const angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
        return (angle < 0) ? angle + 360 : angle;
    }
    return 0;
}

function inicializarHistorial(spinHistoryFromServer) {
if (spinHistoryFromServer && spinHistoryFromServer.length > 0) {
historialPremios = spinHistoryFromServer.map((s, i) => ({
  id: spinHistoryFromServer.length - i,
  nombre: s.nombre,
  fecha: s.fecha,
  timestamp: s.timestamp
}));
contadorPremios = historialPremios.length;
actualizarHistorialVisual();
} else {
historialPremios = [];
contadorPremios = 0;
}

if (codigoActual) {
mostrarHistorial();
}
}

function agregarPremioAlHistorial(premio) {
contadorPremios++;
const nuevoPremio = {
id: contadorPremios,
nombre: premio,
fecha: new Date().toLocaleString('es-ES', {
day: '2-digit',
month: '2-digit',
year: 'numeric',
hour: '2-digit',
minute: '2-digit'
}),
timestamp: Date.now()
};

historialPremios.unshift(nuevoPremio);

// Historial se persiste en la BD via confirm-spin, no en localStorage

actualizarHistorialVisual();
mostrarHistorial();
}

function actualizarHistorialVisual() {
const historialLista = document.getElementById('historial-lista');

historialVacio.style.display = 'block';
}
return;

if (historialVacio) {

let historialHTML = '';

historialHTML += `
                   <div class="premio-item" style="animation: fadeInUp 0.5s ease ${index * 0.1}s both;">

function verificarProgresoPremiosUnicos() {
    if (!premiosActuales || premiosActuales.length === 0) return { total: 0, ganados: 0, restantes: 0 };
    const premiosYaGanados = historialPremios.map(item => item.nombre);
    const premiosUnicos = [...new Set(premiosActuales)];
    const premiosUnicosGanados = [...new Set(premiosYaGanados.filter(p => premiosUnicos.includes(p)))];
    return {
        total: premiosUnicos.length,
        ganados: premiosUnicosGanados.length,
        restantes: premiosUnicos.length - premiosUnicosGanados.length
    };
}

function dibujarRuletaCompleta() {
if (!premiosDisponibles || premiosDisponibles.length === 0) {
return;
}

const canvas = document.getElementById('opciones');
if (!canvas) return;

const ctx = canvas.getContext('2d');
const total = premiosDisponibles.length;
const radio = 220;
const centroX = 225;
const centroY = 225;

ctx.clearRect(0, 0, 450, 450);

for (let i = 0; i < total; i++) {
const anguloInicio = (2 * Math.PI / total) * i;
const anguloFin = (2 * Math.PI / total) * (i + 1);

ctx.save();
ctx.beginPath();
ctx.moveTo(centroX, centroY);
ctx.arc(centroX, centroY, radio, anguloInicio, anguloFin);
ctx.closePath();
                ctx.fillStyle = coloresPremios[i % coloresPremios.length];
                
                const baseColor = coloresPremios[i % coloresPremios.length];
                ctx.fillStyle = baseColor + 'E6';
ctx.fill();
                
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fill();
                
ctx.clip();

                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
const anguloMedio = (anguloInicio + anguloFin) / 2;
const distanciaTexto = radio * 0.65;
const textoX = centroX + Math.cos(anguloMedio) * distanciaTexto;
const textoY = centroY + Math.sin(anguloMedio) * distanciaTexto;

ctx.translate(textoX, textoY);
let rotacion = anguloMedio;
if (rotacion > Math.PI/2 && rotacion < 3*Math.PI/2) rotacion += Math.PI;
ctx.rotate(rotacion);

let textoLimpio = premiosDisponibles[i].replace(/[\u{1F300}-\u{1F9FF}]/gu, '').trim().toUpperCase();
const palabras = textoLimpio.split(' ');
let lineas = [], lineaActual = '';
palabras.forEach(palabra => {
if ((lineaActual + palabra).length > 10 && lineaActual) {
lineas.push(lineaActual.trim());
lineaActual = palabra + ' ';
} else {
lineaActual += palabra + ' ';
}
});
lineas.push(lineaActual.trim());

ctx.textAlign = "center";
ctx.textBaseline = "middle";

let fontSize = 16;
let lineHeight = 18;

if (window.innerWidth <= 360) {
fontSize = 11;
lineHeight = 13;
} else if (window.innerWidth <= 480) {
fontSize = 12;
lineHeight = 14;
} else if (window.innerWidth <= 768) {
fontSize = 14;
lineHeight = 16;
} else if (window.innerWidth <= 992) {
fontSize = 15;
lineHeight = 17;
}

ctx.font = `bold ${fontSize}px Poppins, sans-serif`;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;

const startY = -(lineas.length - 1) * lineHeight / 2;
lineas.forEach((linea, index) => ctx.fillText(linea, 0, startY + (index * lineHeight)));
ctx.restore();
}

            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 2;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            
for (let i = 0; i < total; i++) {
const anguloFin = (2 * Math.PI / total) * (i + 1);
ctx.beginPath();
ctx.moveTo(centroX, centroY);
ctx.lineTo(centroX + radio * Math.cos(anguloFin), centroY + radio * Math.sin(anguloFin));
ctx.stroke();
}

let circleRadius = 40;
let emojiSize = 40;

if (window.innerWidth <= 360) {
circleRadius = 28;
emojiSize = 28;
} else if (window.innerWidth <= 480) {
circleRadius = 32;
emojiSize = 32;
} else if (window.innerWidth <= 768) {
circleRadius = 35;
emojiSize = 35;
} else if (window.innerWidth <= 992) {
circleRadius = 38;
emojiSize = 38;
}

ctx.beginPath();
ctx.arc(centroX, centroY, circleRadius, 0, 2 * Math.PI);
            
            const gradient = ctx.createRadialGradient(centroX, centroY, 0, centroX, centroY, circleRadius);
            gradient.addColorStop(0, temaActual.accent + 'E6');
            gradient.addColorStop(0.7, temaActual.accent + 'B3');
            gradient.addColorStop(1, temaActual.accent + '80');
            
            ctx.fillStyle = gradient;
ctx.fill();
            
            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 5;
ctx.stroke();

ctx.fillStyle = "#ffffff";
ctx.font = `bold ${emojiSize}px Poppins, sans-serif`;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
            ctx.shadowBlur = 3;
            ctx.shadowOffsetX = 1;

ctx.textBaseline = "middle";
ctx.textAlign = "center";

}

// =============================================================================
// GIRAR RULETA ‚Äî server-side flow with EXACT animation from original
// =============================================================================
async function girarRuleta() {
    if (isSpinning || tiradasRestantes <= 0 || premiosActuales.length === 0) return;
    isSpinning = true;

    const girarBtn = document.getElementById('girarBtn');
    girarBtn.disabled = true;
    girarBtn.textContent = 'Girando... üé≤';

    const opcionesCanvas = document.getElementById('opciones');
    document.getElementById('ruleta').classList.add('spinning');

    // FASE 1: Empezar a girar INMEDIATAMENTE (antes de llamar al API)
    const startAngle = getCurrentRotation(opcionesCanvas);
    opcionesCanvas.classList.remove('is-idling');
    opcionesCanvas.style.transition = 'none';
    opcionesCanvas.style.transform = `rotate(${startAngle}deg)`;
    opcionesCanvas.offsetWidth; // forzar reflow

    // Giro r√°pido visual mientras esperamos al servidor
    opcionesCanvas.style.transition = 'transform 10s linear';
    opcionesCanvas.style.transform = `rotate(${startAngle + 3600}deg)`;

    soundSpin.loop = true;
    if (!isMuted) soundSpin.play().catch(()=>{});

    mostrarMensaje("üéØ ¬°La ruleta est√° girando m√°gicamente! ‚ú®");

    try {
        // Llamar a prepare-spin (mientras la ruleta ya gira visualmente)
        const spinRes = await fetch('/api/prepare-spin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codigoId: codigoActual, slug: SLUG })
        });
        const spinData = await spinRes.json();

        if (!spinRes.ok) {
            // Frenar la ruleta
            document.getElementById('ruleta').classList.remove('spinning');
            const stopAngle = getCurrentRotation(opcionesCanvas);
            opcionesCanvas.style.transition = 'none';
            opcionesCanvas.style.transform = `rotate(${stopAngle}deg)`;
            mostrarNotificacion(spinData.error || 'Error al preparar la tirada', 'error');
            mostrarMensaje(spinData.error || 'Error');
            soundSpin.pause();
            soundSpin.currentTime = 0;
            resetearBotonGirar();
            return;
        }

        const { prize: premioGanado, wheelIndex, token, recovered } = spinData;

        // Guardar token para recovery
        localStorage.setItem('pof_token_' + SLUG, JSON.stringify({ token, code: codigoActual }));

        if (recovered) mostrarNotificacion('Recuperando tirada anterior...', 'success');

        // FASE 2: Desacelerar hacia el premio correcto
        const midAngle = getCurrentRotation(opcionesCanvas);
        opcionesCanvas.style.transition = 'none';
        opcionesCanvas.style.transform = `rotate(${midAngle}deg)`;
        opcionesCanvas.offsetWidth; // forzar reflow

        // Calcular √°ngulo final correcto
        // La flecha est√° arriba (270¬∞ en coordenadas canvas desde las 3 en punto)
        // Para que el centro del premio wheelIndex quede bajo la flecha:
        // rotation = 270 - centroDelPremio (mod 360)
        const anguloPorPremio = 360 / premiosDisponibles.length;
        const centroDelPremio = wheelIndex * anguloPorPremio + anguloPorPremio / 2;
        const targetAngle = ((270 - centroDelPremio) % 360 + 360) % 360;
        const delta = ((targetAngle - (midAngle % 360)) % 360 + 360) % 360;
        const anguloFinalTotal = midAngle + 360 * 5 + delta;

        // Aplicar transici√≥n de desaceleraci√≥n
        opcionesCanvas.style.transition = "transform 5s cubic-bezier(.17,.67,.83,.67)";
        opcionesCanvas.style.transform = `rotate(${anguloFinalTotal}deg)`;

        // Procesar resultado cuando termine la animaci√≥n
        setTimeout(() => {
            soundSpin.pause();
            soundSpin.currentTime = 0;
            if (!isMuted) soundWin.play().catch(()=>{});

            document.getElementById('ruleta').classList.remove('spinning');

            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                gravity: 0.8
            });
            // Extra burst for wow-factor
            setTimeout(() => confetti({ particleCount: 80, angle: 60, spread: 55, origin: { x: 0 } }), 200);
            setTimeout(() => confetti({ particleCount: 80, angle: 120, spread: 55, origin: { x: 1 } }), 400);

            // Detener la transici√≥n
            opcionesCanvas.style.transition = 'none';

            // Mostrar popup INMEDIATAMENTE (sin esperar confirm-spin)
            const postMsg = (mensajePremio || '').replace(/\{nombre\}/gi, nombreUsuario);
            mostrarPopupPremio(premioGanado, postMsg);
            mostrarMensaje(`üéâ ¬°Felicidades ${nombreUsuario}! Ganaste: <b>${premioGanado}</b>`);
            agregarPremioAlHistorial(premioGanado);

            // Confirmar spin en segundo plano (no bloquea popup)
            fetch('/api/confirm-spin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    tiradasRestantes = data.remaining_spins;
                }
                localStorage.removeItem('pof_token_' + SLUG);
                mostrarInfoTiradas(tiradasRestantes, expiresAt);
            }).catch(e => console.error('Error confirming spin:', e));

            // Reset button after 3s
            setTimeout(() => {
                resetearBotonGirar();
            }, 3000);

        }, 5200);

    } catch (err) {
        // Frenar la ruleta en caso de error
        document.getElementById('ruleta').classList.remove('spinning');
        const stopAngle = getCurrentRotation(opcionesCanvas);
        opcionesCanvas.style.transition = 'none';
        opcionesCanvas.style.transform = `rotate(${stopAngle}deg)`;
        soundSpin.pause();
        soundSpin.currentTime = 0;
        mostrarNotificacion('Error de conexi√≥n. Tu tirada est√° guardada.', 'error');
        resetearBotonGirar();
    }
}

// =============================================================================
async function compartirPremio() {
    const prize = document.getElementById('popup-prize').textContent;
    const name = config?.display_name || SLUG;
    const theme = temaActual;
    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 400;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 600, 400);
    grad.addColorStop(0, theme.bgA);
    grad.addColorStop(1, theme.bgB);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 28px Poppins, sans-serif';
    ctx.fillText(`${theme.emoji} ${name}`, 300, 80);
    ctx.font = 'bold 22px Poppins, sans-serif';
    ctx.fillText('¬°Gan√© en la ruleta!', 300, 140);
    ctx.font = 'bold 36px Poppins, sans-serif';
    ctx.fillStyle = theme.accent;
    ctx.fillText(prize, 300, 220);
    ctx.font = '16px Poppins, sans-serif';
    ctx.fillStyle = theme.textSoft;
    ctx.fillText('playofans.com/' + SLUG + '/ruleta', 300, 340);
    canvas.toBlob(async blob => {
        if (navigator.share && navigator.canShare) {
            try {
                const file = new File([blob], 'premio.png', { type: 'image/png' });
                await navigator.share({ files: [file], text: `¬°Gan√© "${prize}" en la ruleta de ${name}!` });
            } catch (e) {}
        } else {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'premio.png';
            a.click();
        }
    }, 'image/png');
}

// =============================================================================
// CONTADOR DE TIRADAS Y COUNTDOWN
// =============================================================================
function mostrarInfoTiradas(restantes, expiresAtDate) {
  const word = restantes === 1 ? 'tirada' : 'tiradas';
  let html = `Te quedan <strong>${restantes}</strong> ${word}`;
  if (expiresAtDate) {
    const diff = new Date(expiresAtDate) - Date.now();
    if (diff > 0 && diff < 72 * 3600 * 1000) {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      html += ` <span style="color:var(--accent-principal);font-weight:700">‚è∞ Expira en ${h}h ${m}m</span>`;
    }
  }
  let infoEl = document.getElementById('tiradas-info');
  if (!infoEl) {
    infoEl = document.createElement('div');
    infoEl.id = 'tiradas-info';
    infoEl.style.cssText = 'font-weight:600;color:var(--texto-suave);font-size:.95rem;padding:10px;border-radius:12px;background:var(--accent-soft);border:1px solid var(--accent-border);margin-top:10px;';
    document.getElementById('formulario')?.after(infoEl);
  }
  infoEl.innerHTML = html;
}

let countdownInterval;
function iniciarCountdown() {
    if (!expiresAt) return;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        if (document.getElementById('tiradas-info')) {
            mostrarInfoTiradas(tiradasRestantes, expiresAt);
        }
        const diff = expiresAt - Date.now();
        if (diff <= 0) {
            clearInterval(countdownInterval);
        }
    }, 60000);
}

function aplicarPatronFondo(t) {
  const el = document.getElementById('theme-pattern');
  if (!el) return;
  const pat = THEME_PATTERNS[t.pattern];
  if (pat) {
    el.style.backgroundImage = pat;
    el.style.display = '';
  } else {
    el.style.backgroundImage = 'none';
    el.style.display = 'none';
  }
}

function crearParticulasFondo() {
    const container = document.getElementById('particles-bg');
    if (!container) return;
    container.innerHTML = '';
    const t = temaActual || THEMES.dark_luxury;
    const colors = [t.accent, t.accent2, t.sliceColors[2] || '#ffd700'];
    const emojis = t.particles || [];
    const useEmoji = emojis.length > 0;
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        if (useEmoji && i % 3 !== 0) {
            // Emoji-shaped particle (2 of every 3)
            const emoji = emojis[i % emojis.length];
            const size = Math.random() * 16 + 10;
            p.className = 'bg-particle emoji-particle';
            p.textContent = emoji;
            p.style.fontSize = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 14 + 8) + 's';
            p.style.animationDelay = (Math.random() * 14) + 's';
        } else {
            // Classic circle particle (every 3rd)
            const size = Math.random() * 5 + 2;
            p.className = 'bg-particle';
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.background = colors[i % colors.length];
            p.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + colors[i % colors.length];
            p.style.animationDuration = (Math.random() * 10 + 6) + 's';
            p.style.animationDelay = (Math.random() * 12) + 's';
        }
        container.appendChild(p);
    }
    // Themed background pattern
    aplicarPatronFondo(t);
}

// =============================================================================
// INICIALIZACI√ìN ‚Äî Carga multi-tenant
// =============================================================================
window.addEventListener('load', async () => {
    // CAMBIO 1 ‚Äî Slug desde URL
    const urlParts = window.location.pathname.split('/').filter(Boolean);
    SLUG = urlParts[0] || '';
    if (!SLUG) { showError('Modelo no encontrado'); return; }

    // Leer c√≥digo pre-cargado desde ?c=CODIGO
    const urlParams = new URLSearchParams(window.location.search);
    const preloadedCode = urlParams.get('c');

    try {
        // CAMBIO 2 ‚Äî Carga inicial (reemplaza config-manager)
        const res = await fetch('/api/tenant-config?slug=' + SLUG);
        const data = await res.json();

        if (res.status === 403) { showError(data.error || 'Ruleta no disponible'); return; }
        if (!res.ok) { showError('Ruleta no encontrada'); return; }

        config = data;

        // Cargar premios globales
        premiosDisponibles = data.prizes || [];
        premiosActuales = [...premiosDisponibles];

        // Mostrar nombre del modelo
        document.querySelector('.controls-title').textContent = data.display_name || SLUG;

        // Actualizar t√≠tulo de p√°gina y OG tags
        document.title = data.display_name + ' ‚Äî Ruleta | PlayOFans';
        document.querySelector('meta[property="og:title"]')
          ?.setAttribute('content', data.display_name + ' ‚Äî Ruleta üé∞');
        document.querySelector('meta[property="og:url"]')
          ?.setAttribute('content', 'https://playofans.com/' + SLUG + '/ruleta');

        // Aplicar tema visual
        aplicarTema(data.theme || 'dark_luxury');

        // Configurar m√∫sica
        isMuted = !data.sound_enabled_default;
        actualizarBotonMute();

        // Forzar modo oscuro si est√° configurado
        if (data.force_dark_mode) document.body.classList.add('force-dark');

        // Guardar mensajes personalizados en variables globales
        mensajeBienvenida = data.welcome_message || '';
        mensajePremio = data.post_prize_message || '';

        // Dibujar la ruleta
        dibujarRuletaCompleta();

        // Iniciar la animaci√≥n de rotaci√≥n lenta
        document.getElementById('opciones').classList.add('is-idling');

        // Crear part√≠culas de fondo con colores del tema
        crearParticulasFondo();

        // Ocultar pantalla de carga
        document.getElementById('screen-loading').style.display = 'none';

        // Registrar eventos
        registrarEventos();

        // Si hay c√≥digo pre-cargado, rellenarlo
        if (preloadedCode) {
          document.getElementById('codigo').value = preloadedCode;
          validarCodigo();
        }

        // Demo mode: banner + auto-fill code
        if (SLUG === 'demo') {
          const banner = document.createElement('div');
          banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#ff0066,#b300ff);padding:10px 20px;text-align:center;font-size:.85rem;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;';
          banner.innerHTML = 'üéÆ Esto es una demo ¬∑ Los premios son de ejemplo ¬∑ <a href="/registro" style="color:#fff;text-decoration:underline;font-weight:700">¬°Crea tu propia ruleta!</a>';
          document.body.prepend(banner);
          document.body.style.paddingTop = '42px';
          if (!preloadedCode) {
            document.getElementById('codigo').value = 'DEMO2025';
          }
        }

        // Recovery: check pending token in localStorage
        const savedRaw = localStorage.getItem('pof_token_' + SLUG);
        if (savedRaw) {
          try {
            const parsed = JSON.parse(savedRaw);
            if (parsed.code !== codigoActual) {
              localStorage.removeItem('pof_token_' + SLUG);
            }
          } catch (e) {
            localStorage.removeItem('pof_token_' + SLUG);
          }
        }

    } catch (error) {
        showError('Esta ruleta no est√° disponible üé∞');
    }
});

// =============================================================================
// FUNCI√ìN PARA REGISTRAR EVENTOS
// =============================================================================
function registrarEventos() {
const validarBtn = document.getElementById('validarBtn');
const girarBtn = document.getElementById('girarBtn');
const popupCloseBtn = document.getElementById('popupCloseBtn');
const codigoInput = document.getElementById('codigo');
const btnMute = document.getElementById('btn-mute');
const shareBtn = document.getElementById('popup-share-btn');

if (validarBtn) validarBtn.addEventListener('click', validarCodigo);
if (girarBtn) girarBtn.addEventListener('click', () => { if (!isMuted) soundClick.play().catch(()=>{}); girarRuleta(); });
if (popupCloseBtn) popupCloseBtn.addEventListener('click', cerrarPopup);
if (codigoInput) codigoInput.addEventListener('keypress', e => { if (e.key === 'Enter') validarCodigo(); });
if (btnMute) btnMute.addEventListener('click', toggleMute);
if (shareBtn) shareBtn.addEventListener('click', compartirPremio);
}

// =============================================================================
// RESIZE HANDLER ‚Äî redraw canvas on resize
// =============================================================================
let resizeTimeout;
window.addEventListener('resize', () => {
clearTimeout(resizeTimeout);
resizeTimeout = setTimeout(() => {
if (premiosDisponibles && premiosDisponibles.length > 0) {
dibujarRuletaCompleta();
}
}, 250);
});
</script>
