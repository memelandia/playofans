}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {

color: var(--texto-oscuro);

background-size: 400% 400%; 
animation: gradientMove 10s ease-in-out infinite;
position: relative; overflow-x: hidden;
}
body.force-dark { color-scheme: dark; }

@keyframes gradientMove { 
0% { background-position: 0% 50%; } 
25% { background-position: 100% 50%; }
50% { background-position: 100% 100%; }
75% { background-position: 0% 100%; }
100% { background-position: 0% 50%; }
}
.background-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
.particle { position: absolute; pointer-events: none; opacity: 0.6; animation: floatParticle 8s ease-in-out infinite; }
.particle.heart { font-size: 20px; color: var(--accent-principal); animation: floatHeart 10s ease-in-out infinite; }
.particle.sparkle { width: 8px; height: 8px; background: radial-gradient(circle, var(--accent-secundario), var(--accent-principal)); border-radius: 50%; animation: floatSparkle 6s ease-in-out infinite; }
.particle.star { font-size: 16px; color: var(--accent-secundario); animation: floatStar 12s ease-in-out infinite; }
@keyframes floatParticle {
0%, 100% { transform: translateY(0px) translateX(0px) rotate(0deg); opacity: 0.3; }
25% { transform: translateY(-30px) translateX(15px) rotate(90deg); opacity: 0.7; }
50% { transform: translateY(-20px) translateX(-10px) rotate(180deg); opacity: 0.5; }
75% { transform: translateY(-40px) translateX(20px) rotate(270deg); opacity: 0.8; }
}
@keyframes floatHeart {
0%, 100% { transform: translateY(0px) scale(1) rotate(0deg); opacity: 0.4; }
33% { transform: translateY(-50px) scale(1.2) rotate(15deg); opacity: 0.8; }
66% { transform: translateY(-30px) scale(0.8) rotate(-10deg); opacity: 0.6; }
}
@keyframes floatSparkle {
0%, 100% { transform: translateY(0px) scale(1); opacity: 0.5; box-shadow: 0 0 10px var(--accent-secundario); }
50% { transform: translateY(-40px) scale(1.5); opacity: 1; box-shadow: 0 0 20px var(--accent-principal); }
}
@keyframes floatStar {
0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); opacity: 0.4; }
25% { transform: translateY(-35px) rotate(180deg) scale(1.1); opacity: 0.7; }
50% { transform: translateY(-60px) rotate(360deg) scale(0.9); opacity: 0.9; }
75% { transform: translateY(-25px) rotate(540deg) scale(1.2); opacity: 0.6; }
}
/* === PARTÍCULAS REACTIVAS AL MOUSE === */
.mouse-particle {
position: fixed;
left: 0;
top: 0;
border-radius: 50%;
pointer-events: none;
opacity: 0;
transition: transform 1s ease-out, opacity 1s ease-out;
z-index: 1;
}

.shape { 
position: absolute; border-radius: 50%; opacity: 0.08; 
animation: float 15s ease-in-out infinite; 
}
.shape:nth-child(1) { width: 80px; height: 80px; background: var(--accent-principal); top: 10%; left: 10%; }
.shape:nth-child(2) { width: 120px; height: 120px; background: var(--accent-secundario); top: 20%; right: 15%; animation-delay: 2s; }
.shape:nth-child(3) { width: 60px; height: 60px; background: var(--bg-fondo-c); bottom: 20%; left: 20%; animation-delay: 4s; }
.shape:nth-child(4) { width: 100px; height: 100px; background: var(--accent-principal); bottom: 10%; right: 10%; animation-delay: 1s; }
@keyframes float {
0% { transform: translateY(0) rotate(0deg); }
33% { transform: translateY(-20px) rotate(45deg); }
66% { transform: translateY(15px) rotate(-30deg); }
100% { transform: translateY(0) rotate(0deg); }

/* === SISTEMA DE NOTIFICACIONES === */
.notification-banner {
position: fixed;
top: 0;
left: 0;
width: 100%;
z-index: 10000;
display: none;
transform: translateY(-100%);
transition: transform 0.3s ease;
}

.notification-banner.show {
transform: translateY(0);
}

.notification-banner.success {
background: linear-gradient(135deg, var(--accent-secundario), var(--accent-principal));
}

.notification-banner.error {
background: linear-gradient(135deg, #d9534f, #c9302c);
}

.notification-banner.warning {
background: linear-gradient(135deg, var(--accent-principal), var(--accent-secundario));
}

.notification-content {
display: flex;
justify-content: space-between;
align-items: center;

max-width: 1200px;
margin: 0 auto;
}

.notification-text {
color: white;
font-weight: 600;
font-size: 1rem;
flex-grow: 1;
}

.notification-close {
background: none;
border: none;
color: white;
font-size: 1.5rem;
font-weight: bold;
cursor: pointer;
padding: 0 10px;
opacity: 0.8;
transition: opacity 0.3s ease;
}

.notification-close:hover {
opacity: 1;
}

/* === INDICADORES DE CARGA === */
.loading {
position: relative;
pointer-events: none;
}

.loading::after {
content: '';
position: absolute;
top: 50%;
left: 50%;
width: 20px;
height: 20px;
margin: -10px 0 0 -10px;
border: 2px solid transparent;
border-top-color: currentColor;
border-radius: 50%;
animation: spin 1s linear infinite;
}

@keyframes spin {
to {
transform: rotate(360deg);
}
}

.spinner {
display: inline-block;
width: 20px;
height: 20px;
border: 2px solid transparent;
border-top-color: currentColor;
border-radius: 50%;
animation: spin 1s linear infinite;
margin-right: 8px;
}

/* === CONTROLES SUPERIORES (mute) === */
.top-controls {
position: fixed; top: 15px; right: 15px; z-index: 100;
display: flex; gap: 10px;
}
.top-btn {
width: 44px; height: 44px; border-radius: 50%;
background: var(--glass-white); border: 1px solid var(--glass-border);
backdrop-filter: blur(10px); display: flex; align-items: center;
justify-content: center; font-size: 1.3rem; cursor: pointer;
transition: all 0.3s ease; color: var(--texto-oscuro);
}
.top-btn:hover { transform: scale(1.1); background: var(--accent-soft); }

/* === PANTALLA ERROR / CARGA === */
.screen-error, .screen-loading {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
display: flex; flex-direction: column; align-items: center;
justify-content: center; z-index: 2000;
background: linear-gradient(-45deg, var(--bg-fondo-a), var(--bg-fondo-b), var(--bg-fondo-c));
}
.screen-error h1 { font-size: 4rem; margin-bottom: 20px; }
.screen-error p { font-size: 1.3rem; color: var(--texto-suave); max-width: 400px; }
.screen-loading .spinner-lg {
width: 60px; height: 60px; border: 4px solid var(--glass-border);
border-top-color: var(--accent-principal); border-radius: 50%;
animation: spin 1s linear infinite;
}

// =============================================================================
// getCurrentRotation — EXACT from original
// =============================================================================
function getCurrentRotation(element) {
    const st = window.getComputedStyle(element, null);
    const tm = st.getPropertyValue("-webkit-transform") ||
               st.getPropertyValue("-moz-transform") ||
               st.getPropertyValue("-ms-transform") ||
               st.getPropertyValue("-o-transform") ||
               st.getPropertyValue("transform") ||
               "none";
    if (tm !== "none") {
        const values = tm.split('(')[1].split(')')[0].split(',');
        const a = values[0];
        const b = values[1];
        const angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
        return (angle < 0) ? angle + 360 : angle;
    }
    return 0;
}

function inicializarHistorial() {
const historialGuardado = localStorage.getItem(`pof_historial_${SLUG}_${codigoActual}`);
if (historialGuardado) {
try {
historialPremios = JSON.parse(historialGuardado);
contadorPremios = historialPremios.length;
actualizarHistorialVisual();
} catch (error) {
historialPremios = [];
contadorPremios = 0;
}
} else {
historialPremios = [];
contadorPremios = 0;
}

if (codigoActual) {
mostrarHistorial();
}
}

function agregarPremioAlHistorial(premio) {
contadorPremios++;
const nuevoPremio = {
id: contadorPremios,
nombre: premio,
fecha: new Date().toLocaleString('es-ES', {
day: '2-digit',
month: '2-digit',
year: 'numeric',
hour: '2-digit',
minute: '2-digit'
}),
timestamp: Date.now()
};

historialPremios.unshift(nuevoPremio);

try {
localStorage.setItem(`pof_historial_${SLUG}_${codigoActual}`, JSON.stringify(historialPremios));
} catch (error) {}

actualizarHistorialVisual();
mostrarHistorial();
}

function actualizarHistorialVisual() {
const historialLista = document.getElementById('historial-lista');
const historialVacio = document.getElementById('historial-vacio');

if (!historialLista) return;

if (historialPremios.length === 0) {
if (historialVacio) {
historialVacio.style.display = 'block';
}
return;
}

if (historialVacio) {
historialVacio.style.display = 'none';
}

let historialHTML = '';
historialPremios.forEach((premio, index) => {
historialHTML += `
                   <div class="premio-item" style="animation: fadeInUp 0.5s ease ${index * 0.1}s both;">
                       <div class="premio-numero">${premio.id}</div>
                       <div class="premio-nombre">${escapeHtml(premio.nombre)}</div>
                       <div class="premio-fecha">
                           🕐 ${premio.fecha}
                       </div>
                   </div>
               `;
});

historialLista.innerHTML = historialHTML;

if (historialPremios.length > 0) {
setTimeout(() => {
historialLista.scrollTop = 0;
}, 100);
}
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mostrarHistorial() {
const historialContainer = document.getElementById('historial-container');
if (historialContainer) {
historialContainer.classList.add('visible');
}
}

function verificarProgresoPremiosUnicos() {
    if (!premiosActuales || premiosActuales.length === 0) return { total: 0, ganados: 0, restantes: 0 };
    const premiosYaGanados = historialPremios.map(item => item.nombre);
    const premiosUnicos = [...new Set(premiosActuales)];
    const premiosUnicosGanados = [...new Set(premiosYaGanados.filter(p => premiosUnicos.includes(p)))];
    return {
        total: premiosUnicos.length,
        ganados: premiosUnicosGanados.length,
        restantes: premiosUnicos.length - premiosUnicosGanados.length
    };
}

// =============================================================================
// DIBUJAR RULETA COMPLETA — Canvas (EXACTA del original)
// =============================================================================
function dibujarRuletaCompleta() {
if (!premiosDisponibles || premiosDisponibles.length === 0) {
return;
}

const canvas = document.getElementById('opciones');
if (!canvas) return;

const ctx = canvas.getContext('2d');
const total = premiosDisponibles.length;
const radio = 220;
const centroX = 225;
const centroY = 225;

ctx.clearRect(0, 0, 450, 450);

for (let i = 0; i < total; i++) {
const anguloInicio = (2 * Math.PI / total) * i;
const anguloFin = (2 * Math.PI / total) * (i + 1);

ctx.save();
ctx.beginPath();
ctx.moveTo(centroX, centroY);
ctx.arc(centroX, centroY, radio, anguloInicio, anguloFin);
ctx.closePath();
                ctx.fillStyle = coloresPremios[i % coloresPremios.length];
                
                const baseColor = coloresPremios[i % coloresPremios.length];
                ctx.fillStyle = baseColor + 'E6';
ctx.fill();
                
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fill();
                
ctx.clip();

                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
const anguloMedio = (anguloInicio + anguloFin) / 2;
const distanciaTexto = radio * 0.65;
const textoX = centroX + Math.cos(anguloMedio) * distanciaTexto;
const textoY = centroY + Math.sin(anguloMedio) * distanciaTexto;

ctx.translate(textoX, textoY);
let rotacion = anguloMedio;
if (rotacion > Math.PI/2 && rotacion < 3*Math.PI/2) rotacion += Math.PI;
ctx.rotate(rotacion);

let textoLimpio = premiosDisponibles[i].replace(/[\u{1F300}-\u{1F9FF}]/gu, '').trim().toUpperCase();
const palabras = textoLimpio.split(' ');
let lineas = [], lineaActual = '';
palabras.forEach(palabra => {
if ((lineaActual + palabra).length > 10 && lineaActual) {
lineas.push(lineaActual.trim());
lineaActual = palabra + ' ';
} else {
lineaActual += palabra + ' ';
}
});
lineas.push(lineaActual.trim());

ctx.textAlign = "center";
ctx.textBaseline = "middle";

let fontSize = 16;
let lineHeight = 18;

if (window.innerWidth <= 360) {
fontSize = 11;
lineHeight = 13;
} else if (window.innerWidth <= 480) {
fontSize = 12;
lineHeight = 14;
} else if (window.innerWidth <= 768) {
fontSize = 14;
lineHeight = 16;
} else if (window.innerWidth <= 992) {
fontSize = 15;
lineHeight = 17;
}

ctx.font = `bold ${fontSize}px Poppins, sans-serif`;
                ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;

const startY = -(lineas.length - 1) * lineHeight / 2;
lineas.forEach((linea, index) => ctx.fillText(linea, 0, startY + (index * lineHeight)));
ctx.restore();
}

            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 2;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            
for (let i = 0; i < total; i++) {
const anguloFin = (2 * Math.PI / total) * (i + 1);
ctx.beginPath();
ctx.moveTo(centroX, centroY);
ctx.lineTo(centroX + radio * Math.cos(anguloFin), centroY + radio * Math.sin(anguloFin));
ctx.stroke();
}

let circleRadius = 40;
let emojiSize = 40;

if (window.innerWidth <= 360) {
circleRadius = 28;
emojiSize = 28;
} else if (window.innerWidth <= 480) {

circleRadius = 35;
emojiSize = 35;
} else if (window.innerWidth <= 992) {
circleRadius = 38;
emojiSize = 38;
}

ctx.beginPath();
ctx.arc(centroX, centroY, circleRadius, 0, 2 * Math.PI);
            
            const gradient = ctx.createRadialGradient(centroX, centroY, 0, centroX, centroY, circleRadius);
            gradient.addColorStop(0, temaActual.accent + 'E6');
            gradient.addColorStop(0.7, temaActual.accent + 'B3');
            gradient.addColorStop(1, temaActual.accent + '80');
            
            ctx.fillStyle = gradient;
ctx.fill();
            
            ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 5;
ctx.stroke();

ctx.fillStyle = "#ffffff";
ctx.font = `bold ${emojiSize}px Poppins, sans-serif`;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
            ctx.shadowBlur = 3;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
ctx.textBaseline = "middle";
ctx.textAlign = "center";
ctx.fillText(temaActual.emoji, centroX, centroY + 4);
}

// =============================================================================
// GIRAR RULETA — server-side flow with EXACT animation from original
// =============================================================================
async function girarRuleta() {
    if (isSpinning || tiradasRestantes <= 0 || premiosActuales.length === 0) return;
    isSpinning = true;

    const girarBtn = document.getElementById('girarBtn');
    girarBtn.disabled = true;
    girarBtn.textContent = 'Girando... 🎲';

    soundSpin.loop = true;
    if (!isMuted) soundSpin.play().catch(()=>{});

    mostrarMensaje("🎯 ¡La ruleta está girando mágicamente! ✨");

    try {
        // 1. Call prepare-spin (server picks the prize)
        const spinRes = await fetch('/api/prepare-spin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codigoId: codigoActual, slug: SLUG })
        });
        const spinData = await spinRes.json();

        if (!spinRes.ok) {
            mostrarNotificacion(spinData.error || 'Error al preparar la tirada', 'error');
            mostrarMensaje(spinData.error || 'Error');
            soundSpin.pause();
            soundSpin.currentTime = 0;
            resetearBotonGirar();
            return;
        }

        const { prize: premioGanado, wheelIndex, token, recovered } = spinData;

        // Save token for recovery
        localStorage.setItem('pof_token_' + SLUG, JSON.stringify({ token, code: codigoActual }));

        if (recovered) mostrarNotificacion('Recuperando tirada anterior...', 'success');

        // Usar wheelIndex directamente (el servidor ya eligió el premio)
        const indiceEnRuletaCompleta = wheelIndex;

        // --- INICIO DEL BLOQUE DE ANIMACIÓN (EXACTO del original) ---
        const opcionesCanvas = document.getElementById('opciones');

        // 1. Obtener la rotación actual y detener la animación CSS
        const currentAngle = getCurrentRotation(opcionesCanvas);
        opcionesCanvas.classList.remove('is-idling');
        opcionesCanvas.style.transition = 'none';
        opcionesCanvas.style.transform = `rotate(${currentAngle}deg)`;

        // Forzar un reflow del navegador
        opcionesCanvas.offsetWidth; 

        // 2. Calcular el ángulo final del giro
        const anguloPorPremio = 360 / premiosDisponibles.length;
        const anguloDeGiro = (360 * 6) + (indiceEnRuletaCompleta * anguloPorPremio) + (anguloPorPremio / 2);
        const anguloFinalTotal = currentAngle + anguloDeGiro;

        // 3. Aplicar la transición para el giro rápido
        opcionesCanvas.style.transition = "transform 5s cubic-bezier(.17,.67,.83,.67)";
        opcionesCanvas.style.transform = `rotate(${anguloFinalTotal}deg)`;

        // 4. Procesar el resultado después de que termine el giro
        setTimeout(async () => {
            soundSpin.pause();
            soundSpin.currentTime = 0;
            if (!isMuted) soundWin.play().catch(()=>{});

            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                gravity: 0.8
            });

            // Detener la transición para que la ruleta se quede fija
            opcionesCanvas.style.transition = 'none';

            // Confirm spin con el servidor
            try {
                const confirmRes = await fetch('/api/confirm-spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const confirmData = await confirmRes.json();
                if (confirmRes.ok && confirmData.success) {
                    tiradasRestantes = confirmData.remaining_spins;
                }
            } catch(e) {
                console.error('Error confirming spin:', e);
            }

            // Clean token
            localStorage.removeItem('pof_token_' + SLUG);

            // Mostrar resultado con mensaje post-premio personalizado
            const postMsg = (mensajePremio || '').replace(/\{nombre\}/gi, nombreUsuario);
            mostrarPopupPremio(premioGanado, postMsg);
            mostrarMensaje(`🎉 ¡Felicidades ${nombreUsuario}! Ganaste: <b>${premioGanado}</b>`);
            agregarPremioAlHistorial(premioGanado);
            mostrarInfoTiradas(tiradasRestantes, expiresAt);

            // Reset button after 3s
            setTimeout(() => {
                resetearBotonGirar();
            }, 3000);

        }, 5200);
        // --- FIN DEL BLOQUE DE ANIMACIÓN ---

    } catch (err) {
        soundSpin.pause();
        soundSpin.currentTime = 0;
        mostrarNotificacion('Error de conexión. Tu tirada está guardada.', 'error');
        resetearBotonGirar();
    }
}

// =============================================================================
// RESET BOTON GIRAR
// =============================================================================
function resetearBotonGirar() {
    isSpinning = false;
    const btn = document.getElementById('girarBtn');
    if (tiradasRestantes > 0) {
        btn.disabled = false;
        btn.textContent = '✨ Girar Ruleta ✨';
        mostrarMensaje(`✨ ¡Tienes ${tiradasRestantes} tirada(s) más! ¡Mucha suerte!`);
    } else {
        btn.disabled = true;
        btn.textContent = '😢 Sin tiradas';
        mostrarMensaje(`🌟 ¡Gracias por participar ${nombreUsuario}! 💖`);
    }
}

// =============================================================================
// VALIDAR CODIGO
// =============================================================================
async function validarCodigo() {
if (!isMuted) soundClick.play().catch(()=>{});
const codigoInput = document.getElementById('codigo');
const validarBtn = document.getElementById('validarBtn');
const codigo = codigoInput.value.trim().toUpperCase();

if (!codigo) {
mostrarMensaje("❌ Por favor ingresa un código.");
codigoInput.style.animation = 'shake 0.5s ease-in-out';
setTimeout(() => { codigoInput.style.animation = ''; }, 500);
return;
}

validarBtn.disabled = true;
validarBtn.textContent = '⏳ Validando...';
mostrarMensaje("🔍 Validando tu código...");

try {
const response = await fetch('/api/validate-code', {
  method: 'POST',
  headers: {'Content-Type': 'application/json'},
  body: JSON.stringify({ slug: SLUG, codigoId: codigo, fanName: '' })
});
const result = await response.json();

if (!response.ok) {
mostrarNotificacion(result.error || 'Código no válido', 'error');
mostrarMensaje(`❌ ${result.error || 'Código no válido'}`);
codigoInput.style.animation = 'shake 0.5s ease-in-out';
setTimeout(() => { codigoInput.style.animation = ''; }, 500);
validarBtn.disabled = false;
validarBtn.textContent = '✨ Validar Código ✨';
return;
}

// Success
codigoActual = codigo;
nombreUsuario = result.fan_name || '';
tiradasRestantes = result.remaining_spins || 0;

// Premios del código o globales
if (result.prizes && Array.isArray(result.prizes) && result.prizes.length >= 2) {
premiosActuales = [...result.prizes];
premiosDisponibles = [...result.prizes];
dibujarRuletaCompleta();
} else if (premiosDisponibles && premiosDisponibles.length > 0) {
premiosActuales = [...premiosDisponibles];
}

// Expires at
if (result.expires_at) expiresAt = new Date(result.expires_at);

mostrarNotificacion(`¡Bienvenid@ ${nombreUsuario}! Código válido con ${tiradasRestantes} tirada(s) 🎉`, 'success');

// Mostrar mensaje de bienvenida personalizado
const welcomeMsg = (mensajeBienvenida || '').replace(/\{nombre\}/gi, nombreUsuario);
if (welcomeMsg) {
    mostrarMensaje('💖 ' + welcomeMsg);
} else {
    mostrarMensaje(`💖 ¡Hola ${nombreUsuario}! Tienes ${tiradasRestantes} tirada(s). ¡Mucha suerte!`);
}

// Habilitar botón de girar
const girarBtn = document.getElementById('girarBtn');
if (tiradasRestantes > 0) {
    girarBtn.disabled = false;
    girarBtn.textContent = '✨ Girar Ruleta ✨';
} else {
    girarBtn.disabled = true;
    girarBtn.textContent = '😢 Sin tiradas';
}

codigoInput.disabled = true;
validarBtn.disabled = true;

codigoInput.style.borderColor = '#10ac84';
validarBtn.style.background = 'linear-gradient(45deg, #10ac84, #00d2d3)';
validarBtn.textContent = '✅ Código Válido';

// Inicializar historial y mostrar contador de tiradas
inicializarHistorial();
mostrarInfoTiradas(tiradasRestantes, expiresAt);

} catch (error) {
mostrarNotificacion("Error de conexión. Por favor, inténtalo de nuevo.", 'error');
mostrarMensaje("❌ Error de conexión.");
validarBtn.disabled = false;
validarBtn.textContent = '✨ Validar Código ✨';
}
}

document.getElementById('popup-prize').textContent = premio;
document.getElementById('popup-message').textContent = message || '';
document.getElementById('popup-overlay').classList.add('show');
}

function cerrarPopup() {
    if (!isMuted) soundClick.play().catch(()=>{});
    document.getElementById('popup-overlay').classList.remove('show');

    // Volver a girar lentamente
    if (!isSpinning) {
        document.getElementById('opciones').classList.add('is-idling');
    }
}

function mostrarMensaje(msg) {
const mensajeElement = document.getElementById('mensaje');
mensajeElement.innerHTML = msg;

mensajeElement.classList.add('mensaje-update');
setTimeout(() => {
mensajeElement.classList.remove('mensaje-update');
}, 500);

// =============================================================================
// COMPARTIR (Canvas API)
// =============================================================================
async function compartirPremio() {
    const prize = document.getElementById('popup-prize').textContent;
    const name = config?.display_name || SLUG;
    const theme = temaActual;
    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 400;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 600, 400);
    grad.addColorStop(0, theme.bgA);
    grad.addColorStop(1, theme.bgB);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 28px Poppins, sans-serif';
    ctx.fillText(`${theme.emoji} ${name}`, 300, 80);
    ctx.font = 'bold 22px Poppins, sans-serif';
    ctx.fillText('¡Gané en la ruleta!', 300, 140);
    ctx.font = 'bold 36px Poppins, sans-serif';
    ctx.fillStyle = theme.accent;
    ctx.fillText(prize, 300, 220);
    ctx.font = '16px Poppins, sans-serif';
    ctx.fillStyle = theme.textSoft;
    ctx.fillText('playofans.com/' + SLUG + '/ruleta', 300, 340);
    canvas.toBlob(async blob => {
        if (navigator.share && navigator.canShare) {
            try {
                const file = new File([blob], 'premio.png', { type: 'image/png' });
                await navigator.share({ files: [file], text: `¡Gané "${prize}" en la ruleta de ${name}!` });
            } catch (e) {}
        } else {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'premio.png';
            a.click();
        }
    }, 'image/png');
}

// =============================================================================
// SONIDOS — Mute toggle
// =============================================================================
function actualizarBotonMute() {
  const btn = document.getElementById('btn-mute');
  if (btn) btn.textContent = isMuted ? '🔇' : '🔊';
}

function toggleMute() {
    isMuted = !isMuted;
    actualizarBotonMute();
    if (isMuted) {
        soundSpin.pause();
        soundWin.pause();
        soundClick.pause();
    }
}

// =============================================================================
// CONTADOR DE TIRADAS Y COUNTDOWN
// =============================================================================
function mostrarInfoTiradas(restantes, expiresAtDate) {
  const word = restantes === 1 ? 'tirada' : 'tiradas';
  let html = `Te quedan <strong>${restantes}</strong> ${word}`;
  if (expiresAtDate) {
    const diff = new Date(expiresAtDate) - Date.now();
    if (diff > 0 && diff < 72 * 3600 * 1000) {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      html += ` <span style="color:var(--accent-principal);font-weight:700">⏰ Expira en ${h}h ${m}m</span>`;
    }
  }
  let infoEl = document.getElementById('tiradas-info');
  if (!infoEl) {
    infoEl = document.createElement('div');
    infoEl.id = 'tiradas-info';
    infoEl.style.cssText = 'font-weight:600;color:var(--texto-suave);font-size:.95rem;padding:10px;border-radius:12px;background:var(--accent-soft);border:1px solid var(--accent-border);margin-top:10px;';
    document.getElementById('formulario')?.after(infoEl);
  }
  infoEl.innerHTML = html;
}

let countdownInterval;
function iniciarCountdown() {
    if (!expiresAt) return;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        if (document.getElementById('tiradas-info')) {
            mostrarInfoTiradas(tiradasRestantes, expiresAt);
        }
        const diff = expiresAt - Date.now();
        if (diff <= 0) {
            clearInterval(countdownInterval);
        }
    }, 60000);
}

// =============================================================================
// PANTALLA ERROR / CARGA
// =============================================================================
function showError(msg) {
    document.getElementById('screen-loading').style.display = 'none';
    const screen = document.getElementById('screen-error');
    document.getElementById('error-msg').textContent = msg;
    screen.style.display = 'flex';
}

// =============================================================================
// FONDO INTERACTIVO REACTIVO AL MOUSE
// =============================================================================
function inicializarFondoInteractivo() {
const paleta = ['#ff6b9d', '#ffffff', '#f8b500', '#c44569', '#feca57', '#23a6d5', '#ff9a9e', '#8a2be2'];

crearExplosionBienvenida(paleta);

document.addEventListener('mousemove', function(e) {
if (this._throttleTimer) return;
this._throttleTimer = setTimeout(() => {
this._throttleTimer = null;
}, 50);
crearParticulaMouse(e.clientX, e.clientY, paleta);
});
}

function crearExplosionBienvenida(paleta) {
const centroX = window.innerWidth / 2;
const centroY = window.innerHeight / 2;

for (let i = 0; i < 30; i++) {
setTimeout(() => {
crearParticulaBienvenida(centroX, centroY, paleta, i);
}, i * 50);
}
}

function crearParticulaBienvenida(x, y, paleta, index) {
const particula = document.createElement('div');
particula.className = 'mouse-particle';

const tamaño = Math.random() * 30 + 10;
const color = paleta[Math.floor(Math.random() * paleta.length)];

particula.style.cssText = `
width: ${tamaño}px;
height: ${tamaño}px;
background: ${color};
left: ${x - tamaño/2}px;
top: ${y - tamaño/2}px;
box-shadow: 0 0 ${tamaño}px ${color};
opacity: 1;
z-index: 5;
`;

document.body.appendChild(particula);

setTimeout(() => {
const angulo = (index / 30) * 2 * Math.PI;
const distancia = Math.random() * 300 + 200;
const moveX = Math.cos(angulo) * distancia;
const moveY = Math.sin(angulo) * distancia;
const scale = Math.random() * 1.5 + 0.5;

particula.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale}) rotate(720deg)`;
particula.style.opacity = '0';
}, 100);

setTimeout(() => {
if (particula.parentNode) {
document.body.removeChild(particula);
}
}, 1500);
}

function crearParticulaMouse(x, y, paleta) {
const particula = document.createElement('div');
particula.className = 'mouse-particle';

const tamaño = Math.random() * 20 + 5;
const color = paleta[Math.floor(Math.random() * paleta.length)];

particula.style.cssText = `
width: ${tamaño}px;
height: ${tamaño}px;
background: ${color};
left: ${x - tamaño/2}px;
top: ${y - tamaño/2}px;
box-shadow: 0 0 ${tamaño/2}px ${color};
opacity: 0.8;
`;

document.body.appendChild(particula);

setTimeout(() => {
const moveX = (Math.random() - 0.5) * 80;
const moveY = (Math.random() - 0.5) * 80;
const scale = Math.random() * 2 + 0.5;

particula.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;
particula.style.opacity = '0';
}, 10);

setTimeout(() => {
if (particula.parentNode) {
document.body.removeChild(particula);
}
}, 1000);
}

function createParticles() {
    const container = document.querySelector('.background-shapes');
    if (!container) return;
    const types = ['heart', 'sparkle', 'star'];
    const emojis = { heart: '💖', star: '✨' };

    for (let i = 0; i < 15; i++) {
        const type = types[i % types.length];
        const el = document.createElement('div');
        el.className = `particle ${type}`;
        el.style.left = Math.random() * 100 + '%';
        el.style.top = Math.random() * 100 + '%';
        el.style.animationDelay = (Math.random() * 5) + 's';
        if (emojis[type]) el.textContent = emojis[type];
        container.appendChild(el);
    }
}

// =============================================================================
// INICIALIZACIÓN — Carga multi-tenant
// =============================================================================
window.addEventListener('load', async () => {
    // CAMBIO 1 — Slug desde URL
    const urlParts = window.location.pathname.split('/').filter(Boolean);
    SLUG = urlParts[0] || '';
    if (!SLUG) { showError('Modelo no encontrado'); return; }

    // Leer código pre-cargado desde ?c=CODIGO
    const urlParams = new URLSearchParams(window.location.search);
    const preloadedCode = urlParams.get('c');

    try {
        // CAMBIO 2 — Carga inicial (reemplaza config-manager)
        const res = await fetch('/api/tenant-config?slug=' + SLUG);
        const data = await res.json();

        if (res.status === 403) { showError(data.error || 'Ruleta no disponible'); return; }
        if (!res.ok) { showError('Ruleta no encontrada'); return; }

        config = data;

        // Cargar premios globales
        premiosDisponibles = data.prizes || [];
        premiosActuales = [...premiosDisponibles];

        // Mostrar nombre del modelo
        document.querySelector('.controls-title').textContent = data.display_name || SLUG;

        // Actualizar título de página y OG tags
        document.title = data.display_name + ' — Ruleta | PlayOFans';
        document.querySelector('meta[property="og:title"]')
          ?.setAttribute('content', data.display_name + ' — Ruleta 🎰');
        document.querySelector('meta[property="og:url"]')
          ?.setAttribute('content', 'https://playofans.com/' + SLUG + '/ruleta');

        // Aplicar tema visual
        aplicarTema(data.theme || 'dark_luxury');

        // Configurar música
        isMuted = !data.sound_enabled_default;
        actualizarBotonMute();

        // Forzar modo oscuro si está configurado
        if (data.force_dark_mode) document.body.classList.add('force-dark');

        // Guardar mensajes personalizados en variables globales
        mensajeBienvenida = data.welcome_message || '';
        mensajePremio = data.post_prize_message || '';

        // Dibujar la ruleta
        dibujarRuletaCompleta();

        // Iniciar la animación de rotación lenta
        document.getElementById('opciones').classList.add('is-idling');

        // Crear partículas
        createParticles();

        // Ocultar pantalla de carga
        document.getElementById('screen-loading').style.display = 'none';

        // Registrar eventos
        registrarEventos();

        // Inicializar fondo interactivo
        inicializarFondoInteractivo();

        // Si hay código pre-cargado, rellenarlo
        if (preloadedCode) {
          document.getElementById('codigo').value = preloadedCode;
          validarCodigo();
        }

        // Recovery: check pending token in localStorage
        const savedRaw = localStorage.getItem('pof_token_' + SLUG);
        if (savedRaw) {
          try {
            const parsed = JSON.parse(savedRaw);
            if (parsed.code !== codigoActual) {
              localStorage.removeItem('pof_token_' + SLUG);
            }
          } catch (e) {
            localStorage.removeItem('pof_token_' + SLUG);
          }
        }

    } catch (error) {
        showError('Esta ruleta no está disponible 🎰');
    }
});

// =============================================================================
// FUNCIÓN PARA REGISTRAR EVENTOS
// =============================================================================
function registrarEventos() {
const validarBtn = document.getElementById('validarBtn');
const girarBtn = document.getElementById('girarBtn');
const popupCloseBtn = document.getElementById('popupCloseBtn');
const codigoInput = document.getElementById('codigo');
const btnMute = document.getElementById('btn-mute');
const shareBtn = document.getElementById('popup-share-btn');

if (validarBtn) validarBtn.addEventListener('click', validarCodigo);
if (girarBtn) girarBtn.addEventListener('click', () => { if (!isMuted) soundClick.play().catch(()=>{}); girarRuleta(); });
if (popupCloseBtn) popupCloseBtn.addEventListener('click', cerrarPopup);
if (codigoInput) codigoInput.addEventListener('keypress', e => { if (e.key === 'Enter') validarCodigo(); });
if (btnMute) btnMute.addEventListener('click', toggleMute);
if (shareBtn) shareBtn.addEventListener('click', compartirPremio);
}

// =============================================================================
// RESIZE HANDLER — redraw canvas on resize
// =============================================================================
let resizeTimeout;
window.addEventListener('resize', () => {
clearTimeout(resizeTimeout);
resizeTimeout = setTimeout(() => {
if (premiosDisponibles && premiosDisponibles.length > 0) {
dibujarRuletaCompleta();
}
}, 250);
});
