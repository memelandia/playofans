[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Scheduled function: daily cron at 9:00 AM UTC
[functions."daily-cron"]
  schedule = "0 9 * * *"

# ============================================
# Redirects multi-tenant
# ============================================

# Páginas estáticas (antes de las reglas dinámicas)
[[redirects]]
  from = "/precios"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/demo"
  to = "/demo/ruleta"
  status = 301

[[redirects]]
  from = "/guia"
  to = "/guia.html"
  status = 200

[[redirects]]
  from = "/registro"
  to = "/registro.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to = "/contacto.html"
  status = 200

[[redirects]]
  from = "/superadmin"
  to = "/superadmin.html"
  status = 200

# Bloquear archivos sensibles (force=true para que prevalezca sobre el archivo físico)
[[redirects]]
  from = "/*.sql"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/404.html"
  status = 404
  force = true



# API — Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Multi-tenant: /[slug]/admin → admin.html
[[redirects]]
  from = "/:slug/admin"
  to = "/admin.html"
  status = 200

# Multi-tenant: /[slug]/ruleta → ruleta.html
[[redirects]]
  from = "/:slug/ruleta"
  to = "/ruleta.html"
  status = 200

# Multi-tenant: /[slug] → model-landing.html
[[redirects]]
  from = "/:slug"
  to = "/model-landing.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' *.supabase.co; media-src 'self'; frame-ancestors 'self'"
